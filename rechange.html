<head>
    <meta charset="UTF-8">

    <title data-i18n="page.rechange"></title>
    <link rel="stylesheet" href="./css/all.css">

    <style>
        .rechange-top{
            padding-bottom:10px;
            font-weight:bold;
            border-bottom: 1px solid #ebebeb;
        }
        .rechange-area{
            margin:20px auto;
            width:120px;
            height:120px;
            border-radius:10px;
            border: 1px solid #ebebeb;
            text-align: center;
        }
        .rechange-area img{
            width:100%;
            height:100%;
        }
        .rechange-icon{
            margin-right:10px;
        }
        .pro-img{
            width:30px;
        }
        .rechange-th {
            margin-bottom: 12px;
            font-size: 13px;
            color: #666666;
        }
        .rechange-al{
            height:35px;
            border-bottom:1px solid #ebebeb;
        }
        .form-money{
            border:none;
            width:80%;
            height:100%;
            outline:0;
        }
        .money-input{
            width: 100%;
            border-radius: 5px;
            outline: 0;
            padding: 0 10px;
            border: 1px solid #E1E1E1;
            color: #000;
            height: 35px;
            line-height: 35px;
        }
        .rechange-form-item{
            margin-bottom:12px;
        }
        .layui-upload-file{
            display:none;
        }
        .login-button{
            margin-top:0;
        }
        .upload{
            width:100%;    
        }
        .upload img{
            width:150px;
        }
    </style>

    <script type="text/javascript" src="./js/layer/layer.js"></script>
    <script type="text/javascript" src="./js/layui.js"></script>
    <script type="text/javascript" src="./js/clipboard.min.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
       function getUrlParam(name) {
              const queryString = window.location.search;
              const params = new URLSearchParams(queryString);
              return params.get(name);
        }
        const currId = getUrlParam("id");
        let pic = ''
        let currEnt = {}
        function getList() {
            var url = preFixx + "/index/system/getPayModeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.length) {
                            const indexs = data.findIndex(item => item.id == currId)
                            currEnt = data[indexs];
                            $(".pro-img").attr("src", setUrl(currEnt.channel_logo))
                            $(".rechange-al-th").text(currEnt.pay_name)
                            $(".rechange-area img").attr("src", preFixx + '/' + currEnt.qrcode || '')
                            $("#xxoo").val(currEnt.link_url)
                        }
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function setUrl(url) {
            if(!url || url == null) {
                    return './images/pay-img.png'
            } else {
                if(url.includes('http')) {
                    return url
                } else {
                    return preFixx + '/' + url
                }
            }
        }
        layui.use('upload', function(){
            var upload = layui.upload;
            var uploadInst = upload.render({
                elem: '#uploadUrl' //绑定元素
                ,url: preFixx + '/index/file/upload' //上传接口
                ,headers: { // 严格使用小写header
                    token: sessionStorage.getItem('token') || 'null',
                    Thinklang: sessionStorage.getItem('userLang') || 'zh-cn'
                },done: function(res){
                    if(res.code == 200){
                        pic = res.data.file;
                        $("#uploadUrl").attr("src", preFixx + '/' +pic)
                    }
                }
                ,error: function(){
                    layer.msg($(".msg4").text());
                }
            });
        })
        // 复制
        async function copyText() {
            const text = $('#xxoo').val();
            try {
                // 使用现代Clipboard API
                await navigator.clipboard.writeText(text);
                layer.msg($(".msg1").text());
            } catch (err) {
                // 兼容旧浏览器的备用方案
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                layer.msg($(".msg1").text());
            } 
        }
        function submitForm() {
            if($(".moneys").val() == '') {
                layer.msg($(".msg2").text());
                return false;
            }
            if(pic == '') {
                layer.msg($(".msg3").text());
                return false;
            }
            var url = preFixx + "/index/user/submitRecharge";
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    money: $(".moneys").val(),
                    pay_storageImage: pic,
                    pay_type:  currEnt.type,
                    remark : $(".remark").val(),
                    type: 2,
                    payment_mode_id: currEnt.id
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        layer.msg(result.msg);
                         window.location.href = './rechange-list.html'
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
    	getList()
    </script>
