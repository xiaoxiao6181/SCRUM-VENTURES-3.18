        }

            padding:6px;

    <script>

        var fangStatus = "up"

            fangStatus = "up"
            
            $(".jisu-btn").addClass("up").removeClass("down")
            $(".buy-fang").attr("data-i18n", "pro.long_position")

            i18n.init()
        })
        $(".detail-jian").click(function() {
            fangStatus = "down"
             $(".jisu-btn").addClass("down").removeClass("up")
            $(".buy-fang").attr("data-i18n", "pro.short_position")
            $(".order-alert").show()
            i18n.init()
        })
        $(".modal-close,.login-button").click(function() {
            $(".order-alert").hide()
        })
        $(".bts").click(function() {
            $(".bz-info").show()
        })
        $(".cancel").click(function() {
            $(".bz-info").hide()
        })
        $(".list-area").click(function() {
            $(".bz-info").hide()
        })

        $(".jiao-top li").click(function() {
            const nowIndex = $(this).index()
            $(this).addClass("active").siblings().removeClass("active")
            $(".table-option .option").eq(nowIndex).addClass("active").siblings().removeClass("active")
        })
        $(".two-jiao").click(function() {
            $(".xian-alert").show()
        })
        $(".dao-list").on('click', 'li', function() {
            $(this).addClass("active").siblings().removeClass("active")
            scheme_id = $(this).attr("data-id");
        })
        let timeList = []
        let currData = {}
        let htSxf = 0;
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'GET',
                loading: false,
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { create_order_rate, now_money } = data;
                        htSxf = create_order_rate;
                        $(".curr-sxf").text(`${create_order_rate}%`)
                        $(".all-total").text(now_money)
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        
        function getDetail() {
            var url = preFixx + "/index/product/getProductDetail";
            sendPostRequest({
                url,
                type: 'GET',
                loading: false,
                data: {
                    id: order_pid,
                    latitude_time: period
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { 
                            product_name, price, 
                            time_scheme_list, usable_money, 
                            low, high, close, open, diff_rate, history_list ,
                            profit_status, low_status
                        } = result.data;
                        currData = result.data;
                        $(".pro-name").text(product_name)
                        $(".curr-price").text(price)
                        $(".max-num").text(high)
                        $(".min-num").text(low)
                        $(".yes-num").text(close)
                        $(".open-num").text(open)
                        $(".card-name").text(product_name)
                        $(".proTotal2").text(price)
                        $(".numsss").text(diff_rate)
                        
                        if(history_list && history_list.length) {
                            const klineData = parseData(history_list)
                            // 设置数据
                            chart.applyNewData(klineData);
                        }
                        if(time_scheme_list && time_scheme_list.length > 0) {
                            let reHtml = ''
                            timeList = time_scheme_list
                            scheme_id = time_scheme_list[0].id
                            time_scheme_list.forEach((item, index) => {
                                reHtml += `
                                   <li class="${index == 0 ?'active' : ''}" data-id="${item.id}">
                                        <p class="dao-title">
                                            <span>
                                                ${item.time}
                                            </span>
                                            s
                                        </p>
                                        
                                        <div class="dao-nums">
                                                ${ item.profit_status == 1 ? `
                                                    <p class="dao-sl">
                                                      盈利: ${item.profit_rate}
                                                    </p>
                                                `: '' }
                                                ${ item.low_status == 1 ? `
                                                    <p  class="dao-sl">
                                                      亏损: ${item.loss_rate}
                                                    </p>
                                                `: '' }
                                                
                                            </div>
                                        
                                    </li>     
                                `
                            })
                            $(".dao-list").html(reHtml)
                        }
                        
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".jisu-btn").click(function() {
            if($("#alMoney").val() == '') {
                layer.msg($(".msg1").text())
                return false;
            }
            var url = preFixx + "/index/product/submitProductOrder";
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    product_id: order_pid,
                    money: $("#alMoney").val(),
                    type: fangStatus == "up" ? 1 : 2,
                    scheme_id: scheme_id
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const ids = result.data.id;
                        layer.msg(result.msg);
                        getOrder(ids)
                        
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        })
        function getOrder(ids) {
            var url = preFixx + "/index/product/getProductOrderInfo";
            sendPostRequest({
                url,
                type: 'GET', 
                data: {
                    id: ids
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { predict_earnings_money, earnings_money } =result.data
                        $(".order-alert").hide()
                        $(".next-alert").css("display", "flex");
                        const {  price, close, product_name, profit_status, low_status } = currData;
                        $(".alert-name").html(product_name)
                        // .addClass(fangStatus);
                        $(".buy-in-num").html($("#alMoney").val())
                        // .addClass(fangStatus);
                        $(".buf-type").attr("data-i18n", fangStatus = "up" ? "pro.long_position" : "pro.short_position").addClass(fangStatus);
                        $(".sxf-nun").text(($("#alMoney").val() * (htSxf / 100)).toFixed(1));
                        
                        const nowIndex = timeList.findIndex(item => item.id == scheme_id)
                        $(".content-num").html(`--`)
                        $(".buy-out-num").html(price)
                        $(".order-nun").html("--")
                        i18n.init()
                        
                        // 清除之前的倒计时
                        if (window.countdownTimer) {
                            clearInterval(window.countdownTimer);
                        }
                        // 开始倒计时
                        let remainingTime = timeList[nowIndex].time;
                        $(".buy-time").html(getDjs(remainingTime));
                        
                        window.countdownTimer = setInterval(function() {
                            remainingTime--;
                            if (remainingTime <= 0) {
                                getNewOrder(ids)
                                clearInterval(window.countdownTimer);
                                remainingTime = 0;
                            }
                            if(remainingTime == 0) {
                               getNewOrder(ids)
                            }
                            
                            $(".buy-time").html(getDjs(remainingTime));
                        }, 1000);
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getNewOrder(ids) {
            function getData() {
                var url = preFixx + "/index/product/getProductOrderInfo";
                sendPostRequest({
                    url,
                    type: 'GET', 
                    data: {
                        id: ids
                    },
                    successCallback: function(result) {
                        if(result.code == 200){
                            const {earnings_money } =result.data
                            $(".content-num").html(`${earnings_money > 0 ? `+${earnings_money}` : `${earnings_money}`} USDT`)
                            // .addClass(earnings_money > 0 ? `down` : `up`)
                            const { close } = currData;
                            $(".order-nun").html(close)
                        } else {
                            layer.msg(result.msg);
                        }
    
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
            }
            setTimeout(function() {
                $(".content-num").html($(".msg2").text())
                getData()
            }, 2000);
        }
        $(".al-list").click(function() {
            window.location.href="/jisu.html"
        })
        function getDjs(time) {
            const hours = Math.floor(time / 3600);
            const remainingSeconds = time % 3600;
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            
            // 格式化为两位数并拼接
            const h = (`0${hours}`).slice(-2);
            const m = (`0${minutes}`).slice(-2);
            const s = (`0${seconds}`).slice(-2);
            
            return `<div class="time-text">
                <span>${h}</span> : <span>${m}</span> : <span>${s}</span>
              </div>`; // 返回"时:分:秒"纯数字格式
        }
        setInterval(function() {
            getDetail()
        }, 30000)
        getDetail()
        getUserInfo()
        $(".left-menu").click(function() {
            $(".pro-alert").show()
        })
        function getProList() {
            var url = preFixx + "/index/product/getProductList";
            sendPostRequest({
                url,
                type: 'GET',
                loading: false,
                data: {
                    status: 1
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.length) {
                            // 填充涨幅榜数据
                            const topProducts = data // 按sort字段升序排序
                            let proHtml = '';
                            if(data) {
                                topProducts.sort((x, y) => y.sort - x.sort).forEach(item => {
                                    const product = item;
                                    // 计算涨跌状态
                                    const isUp = parseFloat(product.diff_rate) >= 0;
                                    const changeClass = isUp ? 'down' : 'up';
                                    const changeSign = isUp ? '+' : '';

                                    // 构建logo URL
                                    const logoUrl = product.logo ? preFixx + '/' + product.logo : './images/pro-img.png';

                                    proHtml += `
                                    <div class="leaderboard-item" data-id="${item.id}">
                                       <div class="flex-start pro-o-name">
                                            <div class="leaderboard-title">
                                                <div class="coin-info">${product.product_name}</div>
                                            </div>
                                        </div>
                                        <div class="coin-price ${changeClass}">${parseFloat(product.price).toFixed(3)}</div>
                                        <div class="coin-change ${changeClass} ${isUp ? 'positive' : 'negative'}">${changeSign}${parseFloat(product.diff_rate).toFixed(2)}%</div>
                                    </div>

                                    `
                                })
                                $(".allist").html(proHtml)
                            }
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".alert-close,.logout-modal-cancel").click(function() {
            $(".next-alert").css("display", "none");
        })
        $(".logout-modal-confirm").click(function() {
            $(".next-alert").css("display", "none");
            getUserInfo()
            $(".order-alert").show()
        })
        getProList()
        $(".allist").on("click", ".leaderboard-item", function() {
            window.location.href=`./jiaoyi.html?id=${$(this).attr("data-id")}`
        })
        $(".pro-close").click(function() {
            $(".pro-alert").hide()
        })
        const jiaoId = sessionStorage.getItem("jiaoyiId");
        $(".jiao-href").attr("href", `/jiaoyi.html?id=${jiaoId}`) 
    </script>
</body>

</html>
