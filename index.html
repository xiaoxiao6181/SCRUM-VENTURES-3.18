<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.login"></title>
    <link rel="stylesheet" href="./css/all.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <style>
        .form-container{
            position: relative;
            width:80%;
        }
        .login-item{
            margin-bottom:25px;
        }
        .login-title{
            margin-bottom:12px;
            font-size: 13px;
        }
        .form-input{
            width:100%;
            border-radius:5px;
            outline:0;
            padding:0 10px;
            border:1px solid #E1E1E1;
            color:#000;
            height:40px;
            line-height: 40px;
        }
        .show{
            display:none;
        }
        .hidden{
            display:block;
        }
        .form-al{
            padding:0 10px 0 0;
            border-radius:5px;
            border:1px solid #E1E1E1; 
        }
        .form-money{
            width:80%;
            border-radius:5px;
            padding:0 10px;
            color:#000;
            height:40px;
            outline:0;
            line-height: 40px;
            border:none;
        }
        .forgot-password {
            text-align: right;
            margin-bottom: 20px;
        }

        .forgot-password a {
            color: #000;
            text-decoration: none;
            font-size: 13px;
        }
        .rember{
            margin-right:5px;
            border-radius:5px;
            border:1px solid #E1E1E1; 
        }
        .forgot-password .register-link{
            color:#2979FF;
        }
        .kefu-icon{
            position: absolute;
            right:0%;
            bottom:-18%;
        }
        .switch-lan{
            position: absolute;
            bottom:5%;
            left:0%;
            text-align: center;
            width:100%;
        }
        .switch-lan a{
            margin:0 10px;
            font-size:13px;
            color:#000000;
            text-decoration: blink;
        }
    </style>
</head>

    <script src="./js/layer/layer.js"></script>

    <script src="./js/reset.js"></script>
    <script>
        function getLocalizedMessage(key) {
          try {
              const lang = sessionStorage.getItem("userLang") || "zh-fn";
              if (window.langData && window.langData[lang]) {
                  return window.langData[lang][key] || key;
              }

              return key;
          } catch (e) {
              return key;
          }
      }
        $(".hidden").click(() => {
            $(".form-money").attr("type", "text")
          $(".hidden").hide();
            $(".show").show()
        })
        $(".show").click(() => {
          $(".form-money").attr("type", "password")
          $(".show").hide();
            $(".hidden").show()
        })
        if(!sessionStorage.getItem('userLang')) {
            sessionStorage.setItem("userLang", "zh-fn")
        }
        function getDefault() {
            var url = preFixx + '/index/getSystemConfig'
            sendPostRequest({
                url,
                type: 'get',
                data: {},
                successCallback: function(result) {

                    if(result.code == 200){
                        const { data } = result;

                        if(data.length) {
                            const nowIndex = data.findIndex(item => item.key == 'loging_log')
                            if(nowIndex != -1) {
                                $(".logo img").attr("src", preFixx + '/' + data[nowIndex].value)  
                            }
                        }

                    } else {
                        const message = getLocalizedMessage(result.msg) || result.msg;
                        layer.msg(message);
                    }
               },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        
        $(".login-button").click(function() {
          if($('#name').val() == '') {
              layer.msg($(".msg1").text());
              return false;
          }
          if($('#pwd').val() == '') {
              layer.msg($(".msg2").text());
              return false;
          }

          var url = preFixx + "/index/login";

          sendPostRequest({
              url,
              type: 'POST',
              data: {
                  name: $('#name').val(),
                  pwd: $('#pwd').val()
              },
              successCallback: function(result) {

                  // ✅ 统一提示（成功 / 失败都走这里）
                  const message = getLocalizedMessage(result.msg) || result.msg;
                  layer.msg(message);

                  if(result.code == 200){
                      const { token, userInfo } = result.data;

                      sessionStorage.setItem("token", token);
                      sessionStorage.setItem("isFirst", "true");

                       // ✅ 延迟跳转（等提示显示完）
                      setTimeout(function(){
                          window.location.href = "./home.html";
                      }, 1500);
                  }
              },
              errorCallback: function(xhr) {
                  console.error('请求错误', xhr);
                  layer.msg("网络错误，请稍后再试");
              }
           })
      });
        getDefault()
    </script>
