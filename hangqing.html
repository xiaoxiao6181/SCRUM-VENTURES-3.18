    <style>
        .hang-info {
            background-color: #F7F7F7;
        }
        .hang-tab {
            padding:12px;
        }

        .hang-tab li {
            margin-right:10px;
            color: #8F8F8F;
            list-style: none;
        }

        .hang-tab li.active {
            color: #000;
        }
        .hang-area{
            border-radius:20px 20px 0 0;
            padding:12px;
            height:calc(100vh - 44px);
            background-color:#fff;
        }
        .leaderboard-search{
            margin:10px 0;
            border-radius:20px;
            padding:0 10px;
            height:30px;
            background-color:#F8F8F8;
        }
        .leaderboard-input{
            margin-left:10px;
            width:calc(100% - 50px);
            height:100%;
            outline:0;
            color:#666;
            font-size:12px;
            background:none;
            border:none;

        }
        .leaderboard-th {
            color: #838383;
            width: 100%;
        }
        .leaderboard-item {
                display: flex;
                justify-content: space-between;
                padding: 10px 0;
            }

            .leaderboard-item:last-child {
                border-bottom: none;
            }

            .leaderboard-num {
                margin-right: 10px;
                width: 30px;
                height: 30px;
                line-height: 30px;
            }

            .leaderboard-num img {
                width: 100%;
                height: 100%;
            }

            .coin-info {
                margin-bottom: 5px;
                flex: 2;
            }

            .coin-price {
                flex: 1;
                font-weight: 500;
                color: #10C16B;
                font-size: 14px;
                margin-top: 5px;
            }

            .coin-price.down {
                color: #10C16B;
            }

            .coin-price.up {
                color: #F2485F;
            }

            .coin-change {
                width: 75px;
                height: 30px;
                text-align: center;
                line-height: 30px;
                color: #fff;
                border-radius: 5px;
            }

            .coin-change.down {
                background: #34CE78;
            }

            .coin-change.up {
                background: #F2485F;
            }

            .coin-volume {
                flex: 1;
                text-align: left;
                color: #888;
                font-size: 12px;
            }

            .pro-name {
                padding-right: 1%;
                width: 43%;
            }
            .hang-list{
                display:none;
            }
            .hang-list.active{
                display:block;
            }
            .pro-area{
                width:80%;
            }
    </style>
</head>

    <script>
        $(".hang-tab li").click(function() {
            const nowIndex = $(this).index()
            $(this).addClass("active").siblings().removeClass("active")
            $(".hang-all .hang-list").eq(nowIndex).addClass("active").siblings().removeClass("active")
        })
        function getPro() {
            var url = preFixx + "/index/product/getProductList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {
                    status:1
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.length) {
                            // 填充涨幅榜数据
                            const topProducts = data // 按sort字段升序排序
                            let proHtml = '';
                            if(data) {
                                topProducts.sort((x, y) => y.sort - x.sort).forEach(item => { 
                                    const product = item;
                                    // 计算涨跌状态
                                    const isUp = parseFloat(product.diff_rate) >= 0;
                                    const changeClass = isUp ? 'up' : 'down';
                                    const changeSign = isUp ? '+' : '';

                                    // 构建logo URL
                                    const logoUrl = product.logo ? preFixx + '/' + product.logo : './images/pro-img.png';

                                    proHtml += `
                                    <div class="leaderboard-item" data-id="${item.id}">
                                       <div class="flex-start pro-name">
                                            <div class="leaderboard-num ${changeClass}">
                                                <img src="${logoUrl}" alt="${product.product_name}" onerror="this.src='./images/pro-img.png'">
                                            </div>
                                            <div class="leaderboard-title">
                                                <div class="coin-info">${product.product_name}</div>
                                            </div>
                                        </div>
                                        <div class="coin-price ${changeClass}">${parseFloat(product.price).toFixed(3)}</div>
                                        <div class="coin-change ${changeClass} ${isUp ? 'positive' : 'negative'}">${changeSign}${parseFloat(product.diff_rate).toFixed(2)}%</div>
                                    </div>
                                        
                                    `
                                    $(".jia-all").html(proHtml)
                                })
                            }
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }

            window.location.href=`./jiaoyi.html?id=${$(this).attr("data-id")}`
        })

        $(".jiao-href").attr("href", `/jiaoyi.html?id=${jiaoId}`)

    </script>
