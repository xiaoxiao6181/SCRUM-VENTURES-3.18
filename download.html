    <script src="./js/reset.js"></script>
    <script>
        var link1 = '';
        var link2 = '';
        function getSystem() {
            var url = preFixx + "/index/getSystemConfig";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const nowIndex = data.findIndex(item => item.key == 'app_download_url')
                        if(data[nowIndex]) {
                            link1 = data[nowIndex].link
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".down-link1").click(function() {
            if(link1 == '') {
                layer.msg('请在后台上传安卓下载链接');
                return false;
            }
            window.location.href = 'https://' + link1
        })
        $(".down-link2").click(function() {
            if(link2 == '') {
                layer.msg('请在后台上传MAC下载链接');
                return false;
            }
            window.location.href = 'https://' + link2
        })
        getSystem()
    </script>
