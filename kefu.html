    <script>
        function getCustomerService(){
            let url = preFixx + '/index/getCustomerService'
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result
                        $(".ke-container").html("");
                        for(var i = 0; i < data.length; i++){
                            const item = data[i];
                            if(item.value == 1) {
                                var html = `<div class="ke-item" data-url="${item.link}">
                                    ${item.key === 'zxkf'? '在线客服': item.remark}
                                </div>`;
                                $(".ke-container").append(html)
                            }
                            
                        }
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".ke-container").on('click', '.ke-item', function() {
            window.open(`http://${$(this).attr("data-url")}`,"_blank")
        })
        getCustomerService()
    </script>
