<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.zichan"></title>
    <link rel="stylesheet" href="./css/all.css">
    <link rel="stylesheet" href="./css/swiper-bundle.min.css" />
    <script src="./js/jquery-1.12.4.min.js"></script>
    <style>
        .zichan-th{
            margin:12px 0;
            color:#000;
            text-align: center;
        }
        .zichan-area{
            padding:12px;
            height:140px;
            background:url(./images/zichan-bg.png) no-repeat;
            background-size:100% 100% ;
        }
        .area-title{
            margin-bottom:12px;
            color:#fff;
        }
        .area-content{
            text-align: center;
            color:#fff;
        }
        .area-total{
            margin-bottom:14px;
            font-size: 16px;
        }
        .area-day{
            margin-bottom:12px;
            font-size: 14px;
        }
        .area-nums{
            font-size: 12px;
        }
        .zichan-tabs{
            padding:20px 10%;
            display: flex;
            justify-content: space-around;
        }
        .tabs-title{
            text-align: center;
            font-size:13px;
        }
        .lines{
            width:100%;
            height:5px;
            background:#F7F7F7;
        }
        .th-item{
            padding:5px 0;
            color:#5F5F5F;
            font-size:12px;
        }
        .zichan-item{
            padding-bottom:14px;
            margin-top:20px;
            border-bottom: 1px solid #ebebeb;
        }
        .zichan-item-th{
            margin-bottom:8px;
        }
        .last-item{
            font-size:13px;
            color:#2979FF;
        }
        .zichan{
            padding-bottom:70px;
        }
        /* ===== 订单模块（嵌入资产页） ===== */
.order-module {
  margin-top: 15px;
  background: #f7f7f7;
  padding: 10px;
}

.jisu-tab {
  margin: 10px 0;
  display: flex;
  justify-content: space-between;
}

.jisu-tab li {
  width: 48%;
  height: 35px;
  line-height: 35px;
  text-align: center;
  border: 1px solid #2979FF;
  border-radius: 5px;
  color: #2979FF;
}

.jisu-tab li.active {
  background: #2979FF;
  color: #fff;
}

.ke-area-item {
  margin-top: 10px;
  padding: 10px;
  background: #fff;
  border-radius: 5px;
}

.up { color: #21B060; }
.down { color: #E72F2B; }
    </style>
</head>

    <script src="./js/swiper-bundle.min.js"></script>
    <script src="./js/layer/layer.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        function getYebList() {
            var url = preFixx + '/index/moneyInvestment/getMoneyInvestmentList'
            sendPostRequest({
                    url,
                    type: 'get',
                    data: {},
                    successCallback: function(result) {
                        if(result.code == 200){
                            const { data } = result;
                            if(data && data.length) {
                                let yebHtml = '';
                                data.forEach(item => { 
                                    yebHtml += `
                                        <div class="zichan-item" data-product="${item}">
                                            <p class="zichan-item-th flex-justify">
                                                <span>
                                                    产品名称
                                                </span>
                                                <span>
                                                    ${ item.name }
                                                </span>
                                            </p>
                                            <p class="th-item flex-justify">
                                                <span>
                                                    最低存款
                                                </span>
                                                <span>
                                                    ${ item.min_price }
                                                </span>
                                            </p>
                                            <p class="th-item flex-justify">
                                                <span>
                                                    年化收益
                                                </span>
                                                <span>
                                                    ${ item.rate }%
                                                </span>
                                            </p>
                                            <p class="th-item flex-justify">
                                                <span>
                                                    预期收益
                                                </span>
                                                <span>
                                                    ${ item.rate_price }
                                                </span>
                                            </p>
                                        </div>
                                `
                                });
                                $(".zichan-list").html(yebHtml)
                                i18n.init();
                            }


                        } else {
                            layer.msg(result.msg);
                        }
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
        }
        
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { now_money, total_earnings_money } = data
                        $(".totaks").html(now_money)
                        
                        $(".area-nums").text(total_earnings_money)
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".order-module .jisu-tab li").click(function () {
  const id = $(this).attr("data-status");

  if (asset_listStatus == id) return;

  $(this).addClass("active").siblings().removeClass("active");

  asset_listStatus = id;

  clearAssetIntervals();
  asset_initOrders();
});
        function asset_getList() {
  var url = preFixx + "/index/product/getProductOrderList";

  sendPostRequest({
    url,
    type: 'GET',
    data: {
      status: asset_listStatus,
      page: 1,
      limit: 100
    },
    successCallback: function (res) {
      if (res.code !== 200) {
        layer.msg(res.msg);
        return;
      }

      const data = res.data.data || [];

      let html = '';

      asset_proList = data;

      if (!data.length) {
        $(".order-module .ke-list").html('<p style="text-align:center;color:#999;">暂无订单</p>');
        return;
      }

      data.forEach(item => {

  html += `
  <div class="ke-area-item" data-id="${item.id}">
    <div class="area-item-top flex-justify">
      <p>
        <span>${item.product_name}</span>
        <span>${item.time}S</span>
      </p>
      <span class="${item.type == 1 ? "up" : "down"}">
        <span data-i18n="${item.type == 1 ? 'pro.long_position' : 'pro.short_position'}"></span>
      </span>
    </div>

    <div class="pro-name">
      <span data-i18n="order_id"></span>：
      <span class="pro-code">${item.order_sn}</span>
    </div>

    <div class="flex-justify order-sn">
      <div>
        <span data-i18n="pro.amount"></span>：
        <span>${item.wtye}</span>
      </div>
      <div>
        <span data-i18n="pro.profit_loss"></span>：
        <span class="${item.earnings_money >= 0 ? 'up' : 'down'}">
          ${item.earnings_money >= 0 ? '+' : ''}${item.earnings_money}
        </span>
      </div>
    </div>

    <div class="pro-area">
      <div class="flex-justify pro-item-b">
        <p>
          <span data-i18n="pro.purchase_price"></span>：
          <span>${item.jcdw}</span>
        </p>

        ${
          asset_listStatus == 1
          ? `
          <p>
            <span data-i18n="pro.countdown"></span>
            <span class="countdown-text" data-id="${item.id}">
              ${item.down_time}
            </span>
          </p>`
          : `<p></p>`
        }
      </div>

      <div class="flex-justify">
        <p>
          <span data-i18n="pro.holding_period"></span>
          <span>${item.create_time}</span>
        </p>
        <p>
          <span data-i18n="pro.end_time"></span>
          <span>${item.plan_settle_time}</span>
        </p>
      </div>
    </div>
  </div>
  `;
});

      $(".order-module .ke-list").html(html);
        i18n.init(); // ⭐必须
    }
  });
}
function asset_updateCountdowns() {
  if (asset_listStatus != 1) return;

  $(".countdown").each(function () {
    let sec = parseInt($(this).text());

    if (sec > 0) {
      sec--;
      $(this).text(sec + 's');
    }
  });
}
function clearAssetIntervals() {
  if (asset_countdownInterval) clearInterval(asset_countdownInterval);
  if (asset_refreshInterval) clearInterval(asset_refreshInterval);
}
        function asset_refreshListIfNeeded() {
  if (asset_needRefresh || asset_listStatus == 1) {
    asset_getList();
    asset_needRefresh = false;
  }
}

        let asset_listStatus = 1;
let asset_countdownTimers = {};
let asset_needRefresh = false;
let asset_refreshInterval;
let asset_countdownInterval;
let asset_proList = [];
        const jiaoId = sessionStorage.getItem("jiaoyiId");
        $(".jiao-href").attr("href", `/jiaoyi.html?id=${jiaoId}`) 
        // getYebList()
        getUserInfo()
        // 初始化订单模块
      asset_initOrders();
function asset_initOrders() {
  clearAssetIntervals();

  asset_countdownInterval = setInterval(asset_updateCountdowns, 1000);
  asset_refreshInterval = setInterval(asset_refreshListIfNeeded, 30000);

  asset_getList();
}
    </script>
