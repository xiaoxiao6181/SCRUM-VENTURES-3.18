<!DOCTYPE html>
<html lang="zh-CN">

<head>

    <style>
        .ke-area {
            margin-top: 20px;
        }

        .rechange-th {
            margin-bottom: 12px;
            font-size: 13px;
            color: #666666;
        }
        .cash-top {
            padding-bottom: 12px;
            font-size: 14px;
            margin-bottom: 12px;
            border-bottom: 1px solid #ebebeb;
        }

        .cah-icon {
            margin-right: 10px;
            width: 30px;
        }

        .cah-icon img {
            width: 100%;
        }


        .money-input {
            width: 100%;
            border-radius: 5px;
            outline: 0;
            padding: 0 10px;
            border: 1px solid #E1E1E1;
            color: #000;
            height: 35px;
            line-height: 35px;
        }

        .rechange-form-item {
            margin-bottom: 12px;
        }
        .bzmc{
            display: flex;
            justify-content: flex;
            align-items: center;
            flex-wrap: wrap;
        }
        .bzmc li{
            list-style:none;
            margin-right:2.3%;
            margin-bottom:8px;
            padding:10px 15px;
            width:23%;
            border-radius:5px;
            border:1px solid #ebebeb;
            text-align: center;
        }
        .bzmc li:nth-child(4n){
            margin-right:0;
        }
        .bzmc li.active{    
            border:1px solid #3389FA;
            color:#3389FA;
        }
        .modal-overlay{
            display:none;
        }
        .list-area{
            max-height:400px;
            overflow-y:scroll ;
        }
    </style>
</head>

    <span class="msg-info msg1" data-i18n="msg.qsrqbdz"></span>
    <span class="msg-info msg2" data-i18n="msg.qbdzbnwk"></span>

    <span class="msg-info msg5" data-i18n="msg.yhzBbnwk"></span>
    <script type="text/javascript" src="./js/layer/layer.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        $(".hidden").click(() => {
            $(".form-money").attr("type", "text")
          $(".hidden").hide();
            $(".show").show()
        })
        $(".show").click(() => {
          $(".form-money").attr("type", "password")
          $(".show").hide();
            $(".hidden").show()
        })
        $(".cash-top").click(function() {
            $(".modal-overlay").show()
        })
        $(".cancel").click(function() {
            $(".modal-overlay").hide()
        })
        let allPayList = []
        let currPayment = {}
        function getRechange() { // 获取钱包地址
            var url = preFixx + "/index/system/getPayModeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: { },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result;
                        if(data) {
                            let reHtml = '';
                            data.forEach((item, index) => {
                                reHtml += `
                                    <li class="${index == 0 ? 'active' : ''}" data-id="${item.id}">
                                        <img src="${preFixx + '/' + item.channel_logo}" alt="">
                                        <span class="modal-title">${item.pay_name}</span>
                                    </li>
                                `
                            })
                            allPayList = data;
                            $(".list-area").html(reHtml)
                            currPayment = data[0]
                            setDefault()
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function setDefault() {
            $(".cah-icon img").attr("src", preFixx +  '/' + currPayment.channel_logo)
            $(".cah-title").text(currPayment.pay_name)
            if(currPayment.type == 1) {
                $(".usdt-item").show();
                $(".pay-item").hide();
            } else {
                $(".usdt-item").hide();
                $(".pay-item").show();
            }
        }
        $(".list-area").on('click', 'li', function() {
            const currId = $(this).attr("data-id");
            const nowIndex = allPayList.findIndex(item => item.id == currId);
            currPayment = allPayList[nowIndex];
            $(".modal-overlay").hide()
            setDefault()
        })
        getRechange()
        $(".login-button").click(function() {
            if(currPayment.type == 1) {
                if($("#wallet_address").val() == "") {
                    layer.msg($(".msg1").text())
                    return false;
                  }
                  if($("#wallet_name").val() == "") {
                    layer.msg($(".msg2").text())
                    return false;
                  }
                  
            } else {
                if($("#bank_account").val() == "") {
                    layer.msg($(".msg3").text())
                    return false;
                  }
                // if($("#bank_name").val() == "") {
                //     layer.msg("银行名称不能为空")
                //     return false;
                //   }
                  if($("#bank_branch_name").val() == "") {
                    layer.msg($(".msg5").text())
                    return false;
                  }
                  
            }
            var url = preFixx + "/index/user/submitWithdrawAccount";
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    payment_mode_id: currPayment.id,
                    // bank_name: $("#bank_name").val(),
                    bank_branch_name: $("#bank_branch_name").val(),
                    wallet_name: $("#wallet_name").val(),
                    wallet_address: $("#wallet_address").val(),
                    bank_account: $("#bank_account").val(),
                    bank_user_name: $("#bank_user_name").val(),
                    
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result;
                        if(data) {
                            layer.msg(result.msg);
                            window.location.href="./bank-list.html"
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        })
    </script>
</body>
