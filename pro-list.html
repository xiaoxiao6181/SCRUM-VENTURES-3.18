<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.pro"></title>
    <link rel="stylesheet" href="./css/all.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <style>
        .ke-area{
            margin-top:20px;
        }
        .cai-top{
            padding:15px;
            height:142px;
            background:url(./images/pro-bg.png) no-repeat;
        }
        .cai-th{
            margin-bottom:10px;
            color:#fff;
            font-size: 15px;
        }
        .cai-total{
            margin-bottom:10px;
            font-size:13px;
            color:#fff;
        }
        .cai-btn{
            padding:0 10px;
            display:inline-block;
            background: #3389FA;
            border-radius:5px;
            line-height:40px;
            color:#fff;
            font-size:14px;
        }
        .order-info{
            padding:0 20px;
            margin-top:12px;
        }
        .order-item{
            padding:5px 0;
        }
        .order-item span{
            font-size:12px;
            color:#666666;
        }   
        .order-item span.order-total{
            color:#3389FA;
        }
        .pro-list{
            margin:20px 0;
        }
        .pro-item{
            padding:10px 0;
            border-radius:10px;
            border:1px solid #EEEEEE;
        }
        .pro-top{
            padding:0 12px;
            padding-bottom:20px;
            border-bottom: 1px solid #EEEEEE;
        }
        .pro-img img{
            width:40px;
            height:40px;
        }
        .pro-name{
            margin-left:10px;
            font-size: 18px;
        }
        .pro-day{
            margin-left:10px;
            border-radius:0 10px 0 10px;
            padding:5px;
            color:#fff;
            font-size:12px;
            background-color:#888888;
        }
        .buy-btn{
            border-radius:5px;
            color:#fff;
            padding: 5px 15px;
            background: #3389FA;
        }
        .tag-list{
            margin-top:20px;
            text-align: center;
        }
        .tag-list li{
            flex:1;
            list-style:none;
        }
        .tag-name{
            margin-bottom:12px;
            font-size:12px;
            color: #666666;;
        }
        .tag-num{
            color:#000;
            font-size: 14px;
        }
        .tag-line{
            position: relative;
            margin:20px auto 0 auto;
            width:94%;
            height:10px;
            border-radius:10px;
            overflow: hidden;
            background-color:#666666;
        }
        .tag-nums{
            position: absolute;
            left:0;
            top:0;
            width:100%;
            height:100%;
            background-color: #3389FA;
        }
        .tag-text{
            position: absolute;
            right:5px;
            top:0;
            font-size:12px;
            line-height:10px;
            color:#fff;
        }
    </style>
</head>
<body>

                <p class="cai-th" data-i18n="fund.managed"></p>

            </div>
            <div class="order-info">
                <div class="order-item flex-justify">
                    <span data-i18n="order.total"></span>
                    <span class="order-total total1">  
                        0
                    </span>
                </div>
                <div class="order-item flex-justify">
                    <span data-i18n="profit.yesterday"></span>
                    <span class="order-total total2">  
                        0
                    </span>
                </div>
                <div class="order-item flex-justify">
                    <span data-i18n="profit.accumulated"></span>
                    <span class="order-total total3">  
                        0
                    </span>
                </div>
            </div>

            </div>

        <script src="./js/swiper-bundle.min.js"></script>
    <script src="./js/layer/layer.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        $(".cai-btn").click(function() {
            window.location.href = './history-pro-list.html'
        })
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { now_money } = data;
                        $(".cai-total").html(now_money)
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getTotal() { // 获取余额宝总金额以及昨日收益
            var url = preFixx + '/index/moneyInvestment/getTotalMoneyAndYesterdayMoney'
            sendPostRequest({
                    url,
                    type: 'get',
                    data: {},
                    successCallback: function(result) {
                        if(result.code == 200){
                            const { total_money, yesterday_earnings_money } = result.data
                            $(".total1").html(total_money)
                            $(".total2").html(yesterday_earnings_money)
                        } else {
                            layer.msg(result.msg);
                        }
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
        }
        function getYebList() {
            var url = preFixx + '/index/moneyInvestment/getMoneyInvestmentList'
            sendPostRequest({
                    url,
                    type: 'get',
                    data: {},
                    successCallback: function(result) {
                        if(result.code == 200){
                            const { data } = result;
                            if(data && data.length) {
                                let yebHtml = '';
                                data.forEach(item => { 
                                    yebHtml += `
                                        <div class="pro-item">
                                            <div class="pro-top flex-justify">
                                                <p class="flex-start">
                                                    <span class="pro-img">
                                                        <img src="./images/prod-img.png" alt="">
                                                    </span>
                                                    <span class="pro-name">
                                                        ${item.name}
                                                    </span>
                                                    <span class="pro-day">
                                                        ${item.day}
                                                       
                                                        <span data-i18n="time.day" ></span>
                                                    </span>
                                                </p>
                                                <span class="buy-btn" data-i18n="button.buy" data-id="${item.id}">
                                                    买入
                                                </span>
                                            </div>
                                            <ul class="tag-list flex-start">
                                                <li>
                                                    <p class="tag-name" data-i18n="limit.single" ></p>
                                                    <p class="tag-num">
                                                        ${item.min_price} ~ ${item.top_price}
                                                    </p>
                                                </li>
                                                <li>
                                                    <p class="tag-name" data-i18n="profit.annual"></p>
                                                    <p class="tag-num">
                                                        ${item.rate}%
                                                    </p>
                                                </li>
                                                <li>
                                                    <p class="tag-name" data-i18n="redeem.early"> </p>
                                                    <p class="tag-num">
                                                        ${item.redeem_rate}%
                                                    </p>
                                                </li>
                                            </ul>
                                            <div class="tag-line">
                                                <p class="tag-nums"></p>
                                                <span class="tag-text">100%</span>
                                            </div>
                                        </div>
                                `
                                });
                                $(".pro-list").html(yebHtml)
                                i18n.init();
                            }


                        } else {
                            layer.msg(result.msg);
                        }
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
        }
        function getYebTotal() { // 获取余额宝总金额以及昨日收益
            var url = preFixx + '/index/moneyInvestment/getMoneyEarningsInfo'
            sendPostRequest({
                    url,
                    type: 'get',
                    data: {},
                    successCallback: function(result) {
                        if(result.code == 200){
                            console.log(111, result.data)
                        } else {
                            layer.msg(result.msg);
                        }
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
        }
        getYebList()
        getTotal()
        getUserInfo()
        getYebTotal()
        $(".pro-list").on('click', '.buy-btn', function() {
            const id = $(this).attr("data-id")
            window.location.href = `./pro-detail.html?id=${id}`
        })
    </script>
</body>
</html>
