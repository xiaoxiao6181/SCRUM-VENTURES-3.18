        <div class="logout-modal">
          <div class="logout-modal-content" data-i18n="logout.confirm">
                确定退出当前登录用户？
            </div>
          <div class="logout-modal-actions">
            <button class="logout-modal-btn logout-modal-cancel" data-i18n="button.cancel">取消</button>

    <script src="./js/swiper-bundle.min.js"></script>
    <script src="./js/layer/layer.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        $(".zichan-top").click(function() {
            window.location.href='./user-info.html'
        })
        let defaultData = []
        
        function getSystem() {
            var url = preFixx + "/index/getSystemConfig";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const nowIndex = data.findIndex(item => item.key == 'auth_open')
                        if(data[nowIndex].value == 1) {
                            $(".shiming").addClass('flex-justify')
                        } else {
                            $(".shiming").removeClass('flex-justify').hide()
                        }
                        defaultData = data;
                        getUserInfo()
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { uid, level_name, nickname, avatar, auth_status, credit_score} = data;
                        $(".user-id .ids").html(uid);
                        const nowIndex = defaultData.findIndex(item => item.key == 'app_log')
                        $(".user-img img").attr("src",  preFixx + '/' + (avatar || defaultData[nowIndex].value));
                        $(".nickname").html(nickname);
                        $(".xyf").html(credit_score);
                        $(".vip").html(level_name);
                        if(auth_status == 0) {
                            $(".wait").show()
                            $(".was").hide()
                        } else {
                            $(".wait").hide()
                            $(".was").show()
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".logout-modal-cancel").click(function() {
            $(".logout-modal-mask").css("display", 'none')
        })
        $(".user-layout").click(function() {
            $(".logout-modal-mask").css("display", 'flex')
        })
        $(".logout-modal-confirm").click(function() {
             sessionStorage.clear()   //清除所有session值
            window.location.href='./index.html'
        })
        const jiaoId = sessionStorage.getItem("jiaoyiId");
        $(".jiao-href").attr("href", `/jiaoyi.html?id=${jiaoId}`) 
        getSystem()
    </script>
