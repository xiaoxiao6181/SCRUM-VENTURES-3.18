        }

            color:#000;
        }
        .jisu li.active::after{
            content:'';
            position: absolute;
            left:2px;
            bottom:-3px;

            color:#21B060;
            
        }
        .down{
            color:#E72F2B;
        }
        .area-item-top{
            padding-bottom:10px;
            border-bottom: 1px solid #ebebeb;
        }
        .pro-name{
            margin:10px 0;
        }
        .order-sn{
            margin-bottom:10px;
        }
        .pro-area{
            padding:10px;
            font-size:12px;
            border-radius:5px;
            background-color:#F8F8F8;
        }
        .pro-item-b{
            margin-bottom:12px;
        }
        .alert-area{
            display: flex;
            justify-content: center;
            align-items: center;
            width:100%;
            height:100%;
        }
        .area-content{
            width:90%;
            padding:16px;
            border-radius:10px;
            background:#fff;
        }
        .content-num{
            margin:20px 0;
            text-align: center;
            font-size:28px;
        }
        .alert-name{
            font-size:16px;
        }
        .content-list{
            list-style:none;
        }
        .content-list li{
            padding:5px 0;
            list-style:none;
            font-size:12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pro-alert{
            display:none;
        }

    <script>
        let listStatus = 1;
    let countdownTimers = {}; // 存储每个订单的倒计时数据
    let needRefresh = false;
    let refreshInterval; // 存储列表刷新间隔
    let countdownInterval; // 存储倒计时更新间隔
    let htSxf = 0;
    let proList = [];

    // 初始化函数
    function init() {
        // 清除可能的旧定时器
        clearIntervals();
        
        // 设置倒计时更新间隔（每秒更新）
        countdownInterval = setInterval(updateCountdowns, 1000);
        
        // 设置列表刷新间隔（30秒或倒计时结束时刷新）
        refreshInterval = setInterval(refreshListIfNeeded, 30000);
        
        // 初始加载
        getList();
        getUserInfo();
    }

    // 清除所有定时器
    function clearIntervals() {
        if (countdownInterval) clearInterval(countdownInterval);
        if (refreshInterval) clearInterval(refreshInterval);
    }

    // 切换标签时调用
    $(".jisu-tab li").click(function() {
        const id = $(this).attr("data-status");
        if (listStatus == id) return; // 如果状态没变，不执行任何操作
        
        $(this).addClass("active").siblings().removeClass("active");
        listStatus = id;
        
        // 清除旧的定时器并重新初始化
        clearIntervals();
        init();
    });

    // 清除所有倒计时
    function clearAllCountdowns() {
        countdownTimers = {};
    }

    function getUserInfo() {
        var url = preFixx + "/index/user/getUserInfo";
        sendPostRequest({
            url,
            type: 'GET',
            loading: false,
            data: {},
            successCallback: function(result) {
                if(result.code == 200){
                    const { code, data } = result;
                    const { create_order_rate, now_money } = data;
                    htSxf = create_order_rate;
                } else {
                    layer.msg(result.msg);
                }
            },
            errorCallback: function(xhr) {
                console.error('请求错误', xhr);
            }
        });
    }

    // 获取列表数据
    function getList() {
        // 只有"我的持仓"状态才需要频繁请求
        const isHoldingTab = listStatus == 1;
        
        var url = preFixx + "/index/product/getProductOrderList";
        sendPostRequest({
            url,
            type: 'GET',
            data: {
                status: listStatus,
                page: 1,
                limit: 300
            },
            successCallback: function(result) {
                if(result.code == 200) {
                    const { data } = result.data;
                    $(".ke-list").html("");
                    
                    if(data && data.length) {
                        let reHtml = '';
                        // 过滤掉已经结束的订单（down_time == 0）
                        console.log(111, isHoldingTab)
                        proList = isHoldingTab ? data.filter(item => item.down_time > 0) : data;
                        
                        // 清除旧的倒计时数据
                        clearAllCountdowns();
                        
                        if(proList.length > 0) {
                            needRefresh = isHoldingTab; // 只有"我的持仓"状态需要刷新
                            console.log("pro", proList)
                            proList.forEach(item => {
                                // 计算初始剩余秒数
                                const remainingSeconds = isHoldingTab ? 
                                    item.down_time : 0;
                                console.log(1111, remainingSeconds)
                                // 存储倒计时数据
                                if(isHoldingTab) {
                                    countdownTimers[item.id] = {
                                        createTime: new Date(item.create_time).getTime(),
                                        remaining: remainingSeconds,
                                        endTime: new Date(item.plan_settle_time).getTime()
                                    };
                                }
    
                                reHtml += `
                                    <div class="ke-area-item" data-id="${item.id}">
                                        <div class="area-item-top flex-justify">
                                            <p>
                                                <span>${item.product_name}</span>
                                                <span>${item.time}S</span>
                                            </p>
                                            <span class="${item.type == 1 ? "up" : "down"}">
                                                ${item.type == 1 ? `<span data-i18n="pro.long_position"></span>` : `<span data-i18n="pro.short_position"></span>`}
                                            </span>
                                        </div>
                                        <div class="pro-name">
                                            <span data-i18n="order_id"></span>
                                            <span class="pro-code">${item.order_sn}</span>
                                        </div>
                                        <div class="flex-justify order-sn">
                                            <div>
                                                <span data-i18n="pro.amount"></span>
                                                <span>${item.wtye}</span>
                                            </div>
                                            <div>
                                                <span data-i18n="pro.profit_loss"></span>
                                                <span class="${item.earnings_money >= 0 ? 'up' : 'down'}">
                                                    ${item.earnings_money >= 0 ? '+' : ''}${item.earnings_money}
                                                </span>
                                            </div>
                                        </div>
                                        <div class="pro-area">
                                            <div class="flex-justify pro-item-b">
                                                <p>
                                                    <span data-i18n="pro.purchase_price"></span>
                                                    <span>${item.jcdw}</span>
                                                </p>
                                                ${isHoldingTab ? `
                                                    <p>
                                                        <span data-i18n="pro.countdown"></span>
                                                        <span class="countdown-text" data-id="${item.id}">
                                                            ${getDjs(remainingSeconds)}
                                                        </span>
                                                    </p>
                                                ` : '<p></p>'}
                                            </div>
                                            <div class="flex-justify">
                                                <p>
                                                    <span data-i18n="pro.holding_period"></span>
                                                    <span>${item.create_time}</span>
                                                </p>
                                                <p>
                                                    <span data-i18n="pro.end_time"></span>
                                                    <span>${item.plan_settle_time}</span>
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                `;
                            });
                            
                            $(".ke-list").html(reHtml);
                            i18n.init();
                        } else {
                            needRefresh = false;
                        }
                    } else {
                        needRefresh = false;
                        proList = [];
                    }
                } else {
                    layer.msg(result.msg);
                }
            },
            errorCallback: function(xhr) {
                console.error('请求错误', xhr);
            }
        });
    }

    // 点击查看详情
    $(".ke-list").on('click', '.ke-area-item', function() {
        if(listStatus == 1) {
            return false;
        }
        const currIndex = proList.findIndex(item => item.id == $(this).attr("data-id"));
        if (currIndex === -1) return;
        
        const { create_time, jcdw, time, mode_type, product_name, earnings_money, pcdw, wtye, profit_rate, type } = proList[currIndex];
        $(".pro-alert").css("display", "flex");
        $(".alert-name").html(product_name);
        $(".counet-sl-num").html(earnings_money > 0 ? `+${earnings_money}` : `${earnings_money}`);
        $(".buf-type").attr("data-i18n", type == 1 ? `pro.long_position` : `pro.short_position`)
            .addClass(type == 1 ? "up" : "down")
            .removeClass(type != 1 ? "up" : "down");
        $(".sxf-nun").text((wtye * (htSxf / 100)).toFixed(1));
        $(".content-num").addClass("up");
        $(".buy-in-num").html(jcdw);
        $(".buy-out-num").html(pcdw);
        $(".order-nun").html(wtye);
        $(".buy-time").html(`${time}S`);
        $(".buy-bi").html(`${profit_rate}%`);
        $(".buy-tims").html(create_time);
        i18n.init();
    });

    // 关闭弹窗
    $(".alert-close").click(function() {
        $(".pro-alert").css("display", "none");
    });

    // 格式化倒计时显示
    function getDjs(totalSeconds) {
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        console.log("543, ", `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`)
        return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    // 更新倒计时显示
    function updateCountdowns() {
        const isHoldingTab = listStatus == 1;
        if(!isHoldingTab) return; // 只有"我的持仓"状态需要处理倒计时
        
        let hasEnded = false;
        
        Object.keys(countdownTimers).forEach(id => {
            const timer = countdownTimers[id];
            // 计算剩余时间
            timer.remaining = timer.remaining - 1;
            // 标记是否有订单结束
            if(timer.remaining === 0) {
                hasEnded = true;
            } else {
                // 更新DOM显示
                const $countdown = $(`.countdown-text[data-id="${id}"]`);
                if($countdown.length) {
                    $countdown.text(getDjs(timer.remaining));
                }
            }
            
        });
        
        // 如果有订单结束，标记需要刷新列表
        if(hasEnded) {
            needRefresh = true;
            refreshListIfNeeded()
        }
    }

    // 按需刷新列表
    function refreshListIfNeeded() {
        if(needRefresh || listStatus == 1) {
            getList();
            needRefresh = false;
        }
    }

    // 返回按钮
    function goBack() {
        window.location.href = "./user.html";
    }

    // 页面卸载时清除定时器
    $(window).on('beforeunload', function() {
        clearIntervals();
    });

    // 初始化
    $(document).ready(function() {
        init();
    });
    </script>
