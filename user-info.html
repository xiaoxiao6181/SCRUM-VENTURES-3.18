<!DOCTYPE html>

<head>

    <style>
        .ke-area {
            margin-top: 20px;
        }
        .user-img{
            margin-bottom:12px ;
        }
        .login-item {
            margin-bottom:16px;
        }
        .form-al {
            padding: 0 10px 0 0;
            border-radius: 5px;
            border: 1px solid #E1E1E1;
        }
        .login-title{
            margin-bottom:8px;
        }
        .form-money {
            width:100%;
            border-radius: 5px;
            padding: 0 10px;
            color: #000;
            height: 40px;
            outline: 0;
            line-height: 40px;
            border: none;
        }
        .form-password{
            width:80%;
        }
        .th-item {
            padding: 5px 0;
            color: #5F5F5F;
            font-size: 12px;
        }
        .modal-overlay{
            display:none;
        }
        .show {
            display: none;
        }

        .hidden {
            display: block;
        }
        .upload img{
            width:120px;
            height:120px;
        }
        .modal-area{
            position:absolute;
            left:50%;
            top:50%;
            margin-left:-40%;
            margin-top:-185px;
            padding:10px;
            width:80%;
            height:370px;
            border-radius:10px;
        }
        .top-area{
            margin-bottom:20px;
        }
        .flex-justify{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .login-button{
            margin-top:10px;
            margin-bottom:0;
        }
        .layui-upload-file{
            display:none;
        }
    </style>

    <script>
        $(".close").click(function() {
            $(".modal-overlay").hide()
        })
        let status = "1"
        let defaultData = []
        let pic = ""
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'POST',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { avatar, nickname, account } = data;
                        $("#userName").val(nickname);
                        $("#account").val(account);
                        const nowIndex = defaultData.findIndex(item => item.key == 'app_log')
                        $("#uploadUrl").attr("src",  preFixx + '/' + (avatar || defaultData[nowIndex].value));
                        
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getSystem() {
            var url = preFixx + "/index/getSystemConfig";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        defaultData = data;
                        getUserInfo()
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function setPwd(pwdStatus) {
            status = pwdStatus;
            $(".top-title").attr("data-i18n", status == 1 ? "user.loginPassword" : "user.paymentPassword")
            $(".modal-overlay").show()
            $("#oldPwd").val("")
            $("#newPwd").val("")
            $("#pwd_confirm").val("") 
        }
        $(".login-button").click(function() {
            if($("#oldPwd").val() == '') {
                layer.msg($(".msg1").text());
                return false;
            }
            if($("#newPwd").val() == '') {
                layer.msg($(".msg2").text());
                return false;
            }
            if($("#pwd_confirm").val() == '') {
                layer.msg($(".msg3").text());
                return false;
            }
            if($("#newPwd").val() !=  $("#pwd_confirm").val()) {
                layer.msg($(".msg4").text());
                return false;
            }
            if(status == 1) {
                let url = preFixx + "/index/user/updatePassword"
                sendPostRequest({
                    url,
                    type: 'POST',
                    data: {
                        pwd: $("#oldPwd").val(),
                        new_pwd: $("#newPwd").val(),
                        new_pwd_confirm:$("#pwd_confirm").val()
                    },
                    successCallback: function(result) {
                        if(result.code == 200){
                            const { code, data } = result;
                            const { avatar, nickname, account } = data;
                            layer.msg($(".msg5").text());
                            $(".modal-overlay").hide()
                        } else {
                            layer.msg(result.msg);
                        }
    
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
            } else {
                var url = preFixx + "/index/user/updateOperationPwd";
                sendPostRequest({
                    url,
                    type: 'POST',
                    data: {
                        operation_pwd: $("#oldPwd").val(),
                        new_operation_pwd: $("#newPwd").val(),
                        new_operation_pwd_confirm:$("#pwd_confirm").val()
                    },
                    successCallback: function(result) {
                        if(result.code == 200){
                            const { code, data } = result;
                            const { avatar, nickname, account } = data;
                            layer.msg($(".msg6").text());
                            $(".modal-overlay").hide()
                        } else {
                            layer.msg(result.msg);
                        }
    
                    },
                    errorCallback: function(xhr) {
                        console.error('请求错误', xhr);
                    }
                })
            }
            
        })
