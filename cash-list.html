    <script>
        let proList = []
        function getPro() { // 获取钱包地址
            var url = preFixx + "/index/user/getWithdrawList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    
                    if(result.code == 200){
                        const { data } = result.data;
                        if(data && data.length) {
                            proList = data;
                            let reHtml = "";
                            data.forEach(item => {
                                reHtml += `
                                    <div class="cash-item" data-id="${item.id}">
                                        <div class="flex-justify item-p">
                                            <p class="flex-start">
                                               <span data-i18n="withdrawRecord.time">时间:</span>
                                                <span>
                                                    ${item.create_time}
                                                </span>
                                            </p>
                                            ${ item.review_status == 0 ? `<span class="status wait" data-i18n="status.pending">审批中</span>` : "" }
                                            ${ item.review_status == 1 ? `<span class="status down" data-i18n="status.approved">审批通过</span>` : "" }
                                            ${ item.review_status == 2 ? `<span class="status up" data-i18n="status.rejected">审批失败</span>` : "" }
                                        </div>
                                        <div class="flex-justify item-p cash-p-item">
                                            <p class="flex-start">
                                                <span class="cash-type" data-i18n="withdrawRecord.type">类型:</span>
                                                <span>
                                                    ${item.pay_name }
                                                </span>
                                            </p>
                                            <p class="flex-start item-p cash-p-item">
                                                <span class="cash-type" data-i18n="withdrawRecord.fee">手续费:</span>
                                                <span class="cash-text">
                                                ${ item.deduct_money }
                                                </span>
                                            </p>
                                        </div>
                                        <div class="flex-justify cash-p-item">
                                            <p class="flex-start">
                                                <span class="cash-type" data-i18n="withdrawRecord.amount">提现金额:</span>
                                                <span class="cash-nums">
                                                    ${item.withdraw_money}
                                                </span>
                                            </p>
                                            <p class="flex-start">
                                                <span class="cash-type" data-i18n="withdrawRecord.actualAmount">实际到账:</span>
                                                <span class="cash-text">
                                                    ${item.reality_money }
                                                    
                                                </span>
                                            </p>
                                        </div>
                                        ${ item.review_status == 2 ? `<div class="cash-p-item cash-explain" >
                                            <p class="flex-start cash-type" data-i18n="audit.failureReason"></p>
                                            <p class="flex-start explain-text">
                                                ${item.explain }
                                            </p>
                                        </div>` : `` }
                                        
                                    </div>
                                
                                `
                            })
                            $(".cash-list").html(reHtml)
                            i18n.init()     
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".cash-list").on('click', '.cash-item', function() {
            const currId = $(this).attr("data-id");
            const nowIndex = proList.findIndex(item => item.id == currId);
            const { create_time, withdraw_money, reality_money, deduct_money, type, explain, review_status, pay_name} = proList[nowIndex]
            $(".pro-alert").css("display", "flex");
            $(".withdrawRecord-time").text(create_time);
            $(".withdrawRecord-fee").text(deduct_money);
            $(".withdrawRecord-amount").text(withdraw_money);
            $(".withdrawRecord-actualAmount").text(reality_money);
            $(".withdrawRecord-type").text(pay_name);
            status
            $(".withdrawRecord-status").attr("data-i18n",review_status == 0 ? "status.pending" : review_status == 1 ? "status.approved" : "status.rejected" ).addClass(review_status == 0 ? "wait" : review_status == 1 ? "down" : "up" )
            if(review_status == 2) {
                $(".explain").show()
                $(".audit-failureReason").text(explain) 
            } else {
                $(".explain").hide()
                $(".audit-failureReason").text("") 
            }
            i18n.init()  
        })
        $(".alert-close").click(function() {
            $(".pro-alert").css("display", "none");
        })
        getPro()
    </script>
