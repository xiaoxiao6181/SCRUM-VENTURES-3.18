    <script>
        let allPayList = []
        let currId = ""
        $(".hidden").click(() => {
            $(".address-list").show()
          $(".hidden").hide();
            $(".show").show()
        })
        $(".show").click(() => {
            $(".address-list").hide()
          $(".show").hide();
            $(".hidden").show()
        })
        $(".address-list").on('click', ".address-close", function() {
            $(".logout-modal-mask").css("display", 'flex')
            currId = $(this).attr("data-id")
        })
        $(".logout-modal-cancel").click(function() {
            $(".logout-modal-mask").css("display", 'none')
        })
        $(".card-area").click(function() {
            window.location.href='./add_card.html'
        })
        
        function getRechange() { // 获取钱包地址
            var url = preFixx + "/index/system/getPayModeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: { },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result;
                        if(data) {
                            allPayList = data;
                            getList()
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        
        function getList() { // 获取钱包地址
            var url = preFixx + "/index/user/getWithdrawAccount";
            sendPostRequest({
                url,
                type: 'GET',
                data: { },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result.data;
                        if(data && data.length){
                            let reHtml = ""
                            data.forEach((item,index) => {
                                const nowIndex = allPayList.findIndex(sunItem => sunItem.id == item.payment_mode_id)
                                let logos = ""
                                if(nowIndex != -1) {
                                    logos = preFixx + "/" + allPayList[nowIndex].channel_logo
                                } else {
                                   logos = "" 
                                }
                                reHtml += `
                                    <div class="address-item">
                                        <div class="address-info flex-start">
                                            <span>
                                                <img class="address-ewm" src="${ logos}" alt="">
                                            </span>
                                            <div class="address-text">
                                                <p class="address-name" >
                                                    ${ item.type == 1 ? "USDT" : "银行卡" }
                                                </p>
                                                <p class="address-note" >
                                                    ${ item.type == 1 ? item.wallet_name : item.bank_user_name  }
                                                    ${ item.type != 1 ? item.bank_branch_name : ""  }
                                                </p>
                                            </div>
                                        </div>
                                        <p class="address-num">
                                            ${ item.type == 1 ? item.wallet_address : item.bank_account }
                                        </p>
                                        <span class="address-close" data-id="${item.id}">
                                            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="16" height="16" viewBox="0 0 16 16"><defs><clipPath id="master_svg0_5396_14822"><rect x="0" y="0" width="16" height="16" rx="0"/></clipPath></defs><g clip-path="url(#master_svg0_5396_14822)"><g><path d="M9.986084018749999,7.999999959375L13.39184571875,4.594238259375C13.61743171875,4.368652359375,13.61743171875,3.9687499593749997,13.39184571875,3.743164059375L12.25659181875,2.607910159375C12.03100581875,2.382324218375,11.62963871875,2.382324218375,11.40551761875,2.607910159375L7.99975581875,6.012207059375L4.59399411875,2.606445309375C4.36840821875,2.380859375375,3.96704101875,2.380859375375,3.74291991875,2.606445309375L2.60766601875,3.7416992593750003C2.38208007775,3.967285159375,2.38208007775,4.368652359375,2.60766601875,4.592773459375L6.01196291875,7.999999959375L2.60620116875,11.405761759375C2.38061523475,11.631347659375,2.38061523475,12.032714859375,2.60620116875,12.256835959375L3.7414551187500003,13.392089859375C3.96704101875,13.617675859375,4.36840821875,13.617675859375,4.59252931875,13.392089859375L7.99975581875,9.986328159374999L11.40551761875,13.392089859375C11.63110351875,13.617675859375,12.03247071875,13.617675859375,12.25659181875,13.392089859375L13.39184571875,12.256835959375C13.61743171875,12.031249959375,13.61743171875,11.631347659375,13.39184571875,11.405761759375L9.986084018749999,7.999999959375Z" fill="#FFFFFF" fill-opacity="1" style="mix-blend-mode:passthrough"/></g></g></svg>
                                        </span>
                                    </div>
                                `         
                                $(".address-list").html(reHtml)
                                 i18n.init()     
                            })
                        } 
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".logout-modal-confirm").click(function() {
            var url = preFixx + "/index/user/deleteWithdrawAccount";
            sendPostRequest({
