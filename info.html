    <script>
        var link1 = '';
        var link2 = '';
        function getSystem() {
            var url = preFixx + "/index/user/getUserNoticeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result.data;
                        if(data && data.length > 0) {
                            let reHtml = '';
                            data.forEach(item => {
                                reHtml += `
                                    <div class="list-data-item" data-id="${item.id}">
                                        <div class="item-top flex-start">
                                            <div class="item-img"></div>
                                            <div class="item-info">
                                                <p class="item-th">
                                                    ${item.title}
                                                </p>
                                                <p class="item-text">
                                                   ${item.message}
                                                </p>
                                            </div>
                                        </div>
                                        <div class="flex-justify">
                                            <span class="status">
                                                ${ item.is_read == 0 ? '未读' : '已读' }
                                            </span>
                                            
                                            <span class="times">
                                                ${ item.create_time }
                                            </span>
                                        </div>
                                    </div>
                                `
                            })
                            $(".list-data").html(reHtml)
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".list-data").on("click", ".list-data-item", function() {
            const id = $(this).attr("data-id");
            
            var url = preFixx + "/index/user/readUserNotice";
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    id
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        window.location.href= `./info-detail.html?id=${id}`
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
            
            
        })
        
        
        getSystem()
    </script>
