    <style>
        .ke-area{
            margin-top:20px;
        }
        .cash-top{
            padding-bottom:12px;
            font-size:14px;
            margin-bottom:12px;
            border-bottom: 1px solid #ebebeb;
        }
        .cah-icon{
            margin-right:10px;
            width:30px;
        }
        .cah-icon img{
            width:100%;
        }
        .login-item{
            margin-bottom:14px;
        }
        .login-title{
            margin-bottom:12px;
            font-size: 13px;
        }
        .form-al{
            padding:0 10px 0 0;
            border-radius:5px;
            border:1px solid #E1E1E1; 
        }
        .form-money{
            width:80%;
            border-radius:5px;
            padding:0 10px;
            color:#000;
            height:40px;
            outline:0;
            line-height: 40px;
            border:none;
        }
        .money-card{
            padding-bottom:12px;
            font-size:14px;
            margin-bottom:12px;
            border-bottom: 1px solid #ebebeb;
        }
        .card-item{
            margin-bottom:12px;
            padding:10px;
            border-radius:5px;
            border:1px solid #ebebeb;
        }
        .radio-custom {
            display: none;
        }

        .radio-label {
            position: relative;
            padding-left: 0;
            cursor: pointer;
        }

        .radio-custom + .radio-label:before {
            content: "";
            display: inline-block;
            box-sizing: border-box;
            width: 16px;
            height: 16px;
            border: 1px solid #ccc;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
        }
        .radio-custom:checked + .radio-label:after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 2px;
            left: 0;
            background:url(./images/true-icon.png) no-repeat;
            background-size:100% 100%;
        }
        .empty-area{
            padding:12px 0;
            text-align: center;
            display:none;
        }
        .enpty-title{
            color: #666666;
        }
        .money-amt{
            color:#10C16B;
            font-size:13px;
        }
        .show{
            display:none;
        }
        .hidden{
            display:block;
        }
        .use-money{
            margin-bottom:12px;
        }
        .login-button{
            margin-top:0;
        }
        .modal-overlay{
            display:none;
        }
        .card-area{
            margin-bottom:12px;
            max-height:210px;
            overflow-y: scroll;
        }
        .form-sxf{
            width:100%;
        }
    </style>

    <script>
        $(".hidden").click(() => {
            $(".form-money").attr("type", "text")
          $(".hidden").hide();
            $(".show").show()
        })
        $(".show").click(() => {
          $(".form-money").attr("type", "password")
          $(".show").hide();
            $(".hidden").show()
        })
        $(".cash-top").click(function() {
            $(".modal-overlay").show()
        })
        $(".cancel").click(function() {
            $(".modal-overlay").hide()
        })
        $(".list-area").click(function() {
            $(".modal-overlay").hide()
        })
        $(".money-card").click(function() {
            window.location.href='./bank-list.html'
        })
        let currId = ""
        let allList = []
        function getMoneyList() { // 获取钱包地址
            var url = preFixx + "/index/user/getWithdrawAccount";
            sendPostRequest({
                url,
                type: 'GET',
                data: { },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result.data;
                        if(data && data.length) {
                            $(".empty-area").hide();
                            $(".card-area").show();
                            let reHtml = "";
                            allList = data;
                            data.forEach((item, index) => {
                                reHtml += `
                                    <div class="card-item flex-justify" data-id="${item.id }">
                                        <div class="card-info">
                                            <p class="card-title">
                                                 ${ item.type == 1 ? item.wallet_name : item.bank_user_name }
                                            </p>
                                            <p class="card-account">
                                                ${ item.type == 2 ? item.bank_branch_name : "" } ${ item.type == 1 ? item.wallet_address : item.bank_account }
                                            </p>
                                        </div>
                                        <input type="radio" class="radio-custom" id="path${index}" name="path" ${index === 0 ? 'checked' : ''}>
                                        <label for="path${index}" class="radio-label"></label>
                                    </div> 
                                `
                            })
                            currId = data[0].id;
                            $(".card-area").html(reHtml)
                        } else {
                            $(".empty-area").show();
                            $(".card-area").hide()
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".card-area").on('click', '.card-item', function() {
            $(this).find('.radio-custom').prop('checked', true);
            const res = $("input[name=path]").val();
            currId = $(this).attr("data-id");
        })
        function getTotal() {
            var url = preFixx + '/index/user/getUserInfo'
            sendPostRequest({
                url,
                type: 'get',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){ 
                        const { now_money } = result.data
                        $(".money-amt").html(now_money)
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function changesNm() {
            var url = preFixx + '/index/user/countWithdrawDeductMoney'
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    withdraw_money: $("#cashMoney").val()
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { deduct_money } = result.data
                        $("#sxf").val(deduct_money)
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".form-all").click(function() {
            if($(".money-amt").html() == "") {
                $("#sxf").val("0.00")
                $("#cashMoney").val("0.00")
                return false;
            }
            $("#cashMoney").val($(".money-amt").html())
            changesNm()
        })
        $("#cashMoney").change(function() {
            if($(this).val() == "") {
                $("#sxf").val("0.00")
                return false;
            }
            changesNm()
        })
        
        $(".login-button").click(function() {
            if($("#cashMoney").val() == '') {
                layer.msg($(".msg1").text());
                return false;
            }
            if($("#password").val() == '') {
                layer.msg($(".msg2").text());
                return false;
            }
            var url = preFixx + '/index/user/submitWithdraw'
            const nowIndex = allList.findIndex(item => item.id == currId);
            if(nowIndex == -1) {
                layer.msg($(".msg3").text());
                return false;
            }
            const { type, bank_branch_name, bank_name, bank_account, wallet_name, wallet_address, payment_mode_id, id } = allList[nowIndex];
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    withdraw_money: $("#cashMoney").val(),
                    type, bank_branch_name, bank_name, bank_account, wallet_name, wallet_address,
                    operation_pwd: $("#password").val(),
                    payment_mode_id: payment_mode_id
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        layer.msg(result.msg);
                        window.location.href="./cash-list.html"
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        })
        function goHome() {
            window.location.href="./home.html"
        }
        getMoneyList()
        getTotal()
    </script>
