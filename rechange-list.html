<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.rechangeList"></title>
    <link rel="stylesheet" href="./css/all.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <style>
        .ke-area{
            padding-top:10px;
            
        }
        .page-header{
            background-color:#fff;
        }
        .ke-boady{
            background-color:#fafafa;
        }
        .rechange-list {
            background-color:#fafafa;
        }
        .rechange-item {
            margin-bottom: 16px;
            background-color: #fff;
            padding: 10px;
            border-radius: 10px;
        }
        .rechage-top{
            margin-bottom:12px;
            padding-bottom:12px;
            font-size:16px;
            border-bottom: 1px solid #ebebeb;
        }
        .rechange-h{
            padding:10px 0;
        }
        .rechange-name{
            color:#000;
        }
        .rechange-status{
            color:#21B060;
        }

        .rechange-kind{
            font-size:14px;
            color:#999999;
        }
        .up{
            color:#E72F2B;
            
        }
        .down{
            color:#21B060;
        }
    </style>
</head>
<body class="ke-boady">
    <header class="page-header">
        <span onclick="goBack()" class="back-button">
            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="8.048568725585938" height="14.181901931762695" viewBox="0 0 8.048568725585938 14.181901931762695"><g transform="matrix(-1,0,0,-1,16.097137451171875,28.36380386352539)"><path d="M8.986025805585937,28.363803931762696C8.719358925585938,28.363803931762696,8.541581155585938,28.274914931762694,8.363803385585937,28.097137931762695C8.008247852585937,27.741581931762695,8.097136735585938,27.208247931762696,8.452692505585938,26.852692931762697L14.141582025585937,21.697136831762695C14.319360225585937,21.519358631762696,14.408248425585938,21.341581331762697,14.408248425585938,21.163803131762695C14.408248425585938,20.986024831762695,14.319359325585937,20.808247531762696,14.141582025585937,20.630469831762696L8.363803865585938,15.741581831762694C8.008248329585937,15.386026231762695,7.919359445585937,14.852692961762695,8.274914745585937,14.497137311762696C8.630470275585937,14.141581773762695,9.163803625585938,14.052692891762696,9.519359125585938,14.408248421762694L15.208247625585937,19.297137231762697C15.741580525585938,19.741581931762695,16.097137425585938,20.452693031762696,16.097137425585938,21.163804031762695C16.097137425585938,21.874915131762695,15.830470525585937,22.497137031762698,15.297136825585937,23.030470831762695L9.608247725585937,28.186026931762697C9.430470025585937,28.274915931762695,9.163803125585938,28.363804931762694,8.986025805585937,28.363803931762696Z" fill="#000000" fill-opacity="1" style="mix-blend-mode:passthrough"/></g></svg>
        </span>
        <h1 data-i18n="page.rechangeList">充值记录</h1>
        <span>
            
        </span>
    </header>
    <div class="ke-area">
        <div class="container">
            <div class="rechange-list"></div>
        </div>
    </div>
    <script src="./js/swiper-bundle.min.js"></script>
    <script src="./js/layer/layer.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        function getList() {
            var url = preFixx + "/index/user/getRechargeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const reList = data.data;
                        if(reList && reList.length > 0) {
                            let reHtml = '';
                            reList.forEach(item => {
                                const { status, money, create_time, type } = item;
                                reHtml += `
                                    <div class="rechange-item">
                                            <div class="rechage-top flex-justify">
                                                <p class="rechange-name">
                                                    <span>
                                                        <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="20" height="20" viewBox="0 0 20 20"><defs><clipPath id="master_svg0_5435_07780"><rect x="2" y="18" width="16" height="16" rx="0"></rect></clipPath></defs><g><g><rect x="0" y="0" width="20" height="20" rx="4" fill="#3389FA" fill-opacity="1"></rect></g><g transform="matrix(0,-1,1,0,-16,20)" clip-path="url(#master_svg0_5435_07780)"><g><path d="M14.260608696875,20.50244140625L5.725652196875,20.50244140625C5.054843666875,20.50244140625,4.506591796875,21.05070924625,4.506591796875,21.72150180625L4.506591796875,24.16038990625L4.506591796875,27.81846620625L4.506591796875,30.25658700625C4.506591796875,30.92803440625,5.054859636875,31.47643040625,5.725652196875,31.47643040625L14.260608696875,31.47643040625C14.931401796875,31.47643040625,15.480436796875,30.92803440625,15.480436796875,30.25658700625L15.480436796875,21.72150230625C15.480436796875,21.05069303625,14.931401796875,20.50244140625,14.260608696875,20.50244140625ZM9.383472396875,29.03752610625L9.383472396875,27.20835210625L5.725652196875,27.20835210625L5.725652196875,24.76946400625L9.383472396875,24.76946400625L9.383472396875,22.94056180625L12.431435096875,25.98943570625L9.383472396875,29.03752610625Z" fill="#FFFFFF" fill-opacity="1" style="mix-blend-mode:passthrough"></path></g></g></g></svg>
                                                    </span>
                                                    <span data-i18n="nav.recharge"></span>
                                                </p>
                                               <p class="rechange-status ${status === 1 ? 'down' : status === 0 ? 'down' : 'up'}" 
                                                   data-i18n="status.${status === 1 ? 'success' : status === 0 ? 'pending' : 'failed'}">
                                                </p>
                                            </div>
                                            <div class="rechange-h flex-justify align-center">
                                                <span class="rechange-kind" data-i18n="currency.type"></span>
                                                <span class="rechange-type">
                                                    ${item.currency_name}
                                                </span>
                                            </div>
                                            <div class="rechange-h flex-justify align-center">
                                                <span class="rechange-kind" data-i18n="pro.type"></span>
                                                    ${item.type === 1 ? 
                                                        `<span class="rechange-type" 
                                                          data-i18n="rechange.type.back"></span>` : `<span class="rechange-type"  data-i18n="rechange.type.front"  ></span>`}
                                                
                                                      
                                            </div>
                                            
                                            <div class="rechange-h flex-justify align-center">
                                                <span class="rechange-kind" data-i18n="pro.amount" ></span>
                                                <span class="rechange-type">
                                                    ${ money }
                                                </span>
                                            </div>
                                            <div class="rechange-h flex-justify align-center">
                                                <span class="rechange-kind" data-i18n="pro.time"> </span>
                                                <span class="rechange-type">
                                                    ${ create_time }
                                                </span>
                                            </div>
                                        </div>
                                
                                `
                            })
                            $(".rechange-list").html(reHtml)
                            i18n.init()     
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
    
        getList()
    </script>
</body>
</html>
