<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.rold"></title>
    <link rel="stylesheet" href="./css/all.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <style>

        .option {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }

        .radio-custom {
            display: none;
        }

        .radio-label {
            position: relative;
            padding-left: 0;
            cursor: pointer;
        }

        .radio-custom + .radio-label:before {
            content: "";
            display: inline-block;
            box-sizing: border-box;
            width: 16px;
            height: 16px;
            border: 1px solid #ccc;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
        }
        .radio-custom:checked + .radio-label:after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 2px;
            left: 0;
            background:url(./images/true-icon.png) no-repeat;
            background-size:100% 100%;
        }

        .option-text {
            flex: 1;
            font-size: 14px;
        }
        .rold-list{
            padding-top:30px;
        }
    </style>
</head>
<body>

    <div class="rold-list">
        <div class="container rold-items">
            <!--<div class="option">-->
            <!--    <span class="option-text">路径1 (230 ms)</span>-->
            <!--    <input type="radio" class="radio-custom" id="path1" name="path" checked>-->

            <!--</div>-->
        </div>
    </div>
    <div class="loading-indicator"  style="display:none; text-align:center; padding:20px; color:#666;">
       <span data-i18n="loading">加载中...</span>
    </div>
    
    <script type="text/javascript" src="./js/layer/layer.js"></script>
    <script type="text/javascript" src="./js/clipboard.min.js"></script>
    <script src="lang/lang.js"></script>
    <script src="./js/reset.js"></script>
    <script>
        // 模拟路径数据
        let pathData = [
            { id: 'path1', name: currLangList["switch.road1"], delay: 0 },
            { id: 'path2', name: currLangList["switch.road2"], delay: 0 },
            { id: 'path3', name: currLangList["switch.road3"], delay: 0 },
            { id: 'path4', name: currLangList["switch.road4"], delay: 0 }
        ];
        // 当前选中的路径
        let selectedPath = 'path1';

        // 生成50-200ms之间的随机延迟
        function getRandomDelay() {
            return Math.floor(Math.random() * (200 - 50 + 1)) + 50;
        }

        // 加载路径列表
        function loadPathList() {
            // 显示加载指示器
            $('.loading-indicator').show();

            // 随机延迟50-200ms
            const loadDelay = getRandomDelay();

            setTimeout(function() {
                // 更新每个路径的延迟时间
                pathData.forEach(function(path) {
                    path.delay = getRandomDelay();
                });

                // 渲染列表
                renderPathList();

                // 隐藏加载指示器
                $('.loading-indicator').hide();

            }, loadDelay);
        }

        // 渲染路径列表
        function renderPathList() {
            let html = '';
            console.log(111, pathData)
            pathData.forEach(function(path, index) {
                const checked = path.id === selectedPath ? 'checked' : '';
                html += `
                    <div class="option" data-path-id="${path.id}">
                        <span class="option-text">${path.name} (${path.delay} ms)</span>
                        <input type="radio" class="radio-custom" id="${path.id}" name="path" ${checked}>
                        <label for="${path.id}" class="radio-label"></label>
                    </div>
                `;
            });

            $('.rold-items').html(html);
        }

        // 点击选项切换路径
        $(document).on('click', '.option', function() {
            const pathId = $(this).attr('data-path-id');
            selectedPath = pathId;
            $(this).find('.radio-custom').prop('checked', true);
            console.log('切换到: ' + pathId);
        });
        

        // 初始加载
        loadPathList();

        // 每隔5秒重新加载一次
        setInterval(function() {
            loadPathList();
        }, 5000);
    </script>
</body>
</html>
