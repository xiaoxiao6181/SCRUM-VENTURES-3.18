<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="page.home"></title>
    <link rel="stylesheet" href="./css/all.css">
    <link rel="stylesheet" href="./css/swiper-bundle.min.css" />
    <script src="./js/jquery-1.12.4.min.js"></script>
    <style>
        /* 头部信息 */
        .header {
            width:100%;
            margin: 0 auto;
            color: white;
            padding:10px 0 0 0;
            margin-bottom: 16px;
            
        }
        
        .header h1 {
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 600;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 4px;
        }
        .header-logo img{
            height:37px;
        }
        .banner{
            width:100%;
            margin: 0 auto;
        }
        .banner img{
            width:100%;
            height:auto;
        }
        
        /* 导航栏 */
        .nav {
            width:100%;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            border-radius: 12px;
        }
        
        .nav-item {
            padding: 8px 0;
            text-align: center;
        }
        .nav-img{
            margin:0 auto;
            width: 50px;
            height: 50px;
            border-radius:50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.1) 0%, rgba(216, 216, 216, 0) 100%);
        }
        .nav-title{
            margin-top:5px;
            font-size:12px;
            color: #000000;
        }
        
        /* 行情区域 */
        .market{
            padding-top: 20px;
        }
        .hot-pro{
            margin-bottom: 20px;
            font-size: 18px;
            font-weight:bold;
        }
        
        
        .coin-pair {
            font-weight: 500;
        }
        
        .price {
            font-weight: 600;
        }
        
        .change {
            font-weight: 500;
        }
        
        .change.negative {
            color: #e15241;
        }
        
        .change.positive {
            color: #4caf50;
        }
        
        /* 涨幅榜 */
        .leaderboard-top{
            margin-top:30px;
            padding-top:30px;
            border-top:5px solid #ebebee;
            margin-bottom:55px;
            border-bottom:5px solid #ebebee;
        }
        .leaderboard {
            width:94%;
            margin: 0 auto;
            margin-bottom: 16px;
        }
        
        .leaderboard-title {
            /*text-align: center;*/
            /*font-weight: 600;*/
            /*font-size: 16px;*/
            /*margin-bottom: 16px;*/
            /*color: #8C939D;*/
            /*position: relative;*/
            width:calc(100% - 40px);
        }
        
        /*.leaderboard-title:before,*/
        /*.leaderboard-title:after {*/
        /*    content: "——";*/
        /*    position: absolute;*/
        /*    top: 50%;*/
        /*    transform: translateY(-50%);*/
        /*    color: #F7DC37;*/
        /*}*/
        
        /*.leaderboard-title:before {*/
        /*    left: 30%;*/
        /*}*/
        
        /*.leaderboard-title:after {*/
        /*    right: 30%;*/
        /*}*/
        
        .leaderboard-item {
            display: flex;
            justify-content: space-between;

            padding: 10px 0;
        }
        
        .leaderboard-item:last-child {
            border-bottom: none;
        }
        .leaderboard-num{
            margin-right:10px;
            width:30px;
            height:30px;
            line-height:30px;
        }
        .leaderboard-num img{
            width:100%;
            height:100%;
        }
        .coin-info {
            margin-bottom:5px;
            flex: 2;
        }
        
        .coin-price {
            flex: 1;
            font-weight: 500;
            color:#10C16B;
            font-size:14px;
            margin-top:5px;
        }
        .coin-price.down{
            color:#10C16B;
        }
        .coin-price.up{
            color:#F2485F;
        }
        .coin-change{
            width: 75px;
            height: 30px;
            text-align: center;
            line-height:30px;
            color:#fff;
            border-radius: 5px;
        }
        .coin-change.down{
            background: #34CE78;
        }
        .coin-change.up{
            background:#F2485F;
        }
        .coin-volume {
            flex: 1;
            text-align: left;
            color: #888;
            font-size: 12px;
        }
        .content{
            padding:10px 0;
        }
        .announcement-container {
            flex: 1;
            height: 20px;
            overflow: hidden;
            position: relative;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }
        .announcement {
            position: absolute;
            white-space: nowrap;
            animation: marquee 20s linear infinite;
        }
        
        .announcement i {
            color: #ef4444;
            margin-right: 8px;
        }
        .announcement p{
            margin-top:-15px;
        }
        
        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .market-name{
            margin-bottom:6px;
            font-weight:bold;
        }
        .market-price{
            margin-bottom: 6px;
            font-size:15px;
        }
        .market-nums{
            margin-bottom: 6px;
            
            font-size:12px;
        }
        .market-price.zf{
            color:#F2485F;
        }
        .market-nums.zf{
            color:#F2485F;
        }
        .market-price.die{
            color:#10C16B;
        }
        .market-nums.die{
            color:#10C16B;
        }
        .market-option{
            color:#666666;
            font-size:12px;
        }
        .market-option i{
            margin-left:5px;
        }
        .pro-area{
            position: relative;
        }
        .pagin{
            width:100%;
        }
        .pro-area .pagin{
            margin-top:10px;
            text-align: center;
        }
        .pro-area .pagin .swiper-pagination-bullet{
            background-color:#D8D8D8;
            margin:0;
            opacity:1;
            width:25px;
            height:5px;
            border-radius:0;
        }
        .pro-area .pagin .swiper-pagination-bullet:first-child{
            border-radius:5px 0 0 5px;
        }
        .pro-area .pagin .swiper-pagination-bullet:last-child{
            border-radius:0 5px 5px 0;
        }
        .pro-area .pagin .swiper-pagination-bullet.swiper-pagination-bullet-active{
            background-color:#000;
        }
        .leaderboard-th{
            color:#838383;
            width:100%;
        }
        .pro-name{
            padding-right:1%;
            width:43%;
        }
        .lagout-header{
            margin-bottom:12px;
        }
        .flex-justify{
            display: flex;
            justify-content: space-between;
            align-items:center;
        }
        .flex-start{
            display: flex;
            justify-content: flex-start;
            align-items: center;
        }
        .logout-modal{
            border-radius:5px;   
        }
        .lagout-icon{
            margin-right:10px;
        }
        .lagout-conntent{
            position: relative;
            padding-left:12px;
            font-size:14px;
            line-height:20px;
            color:#374151;
            text-align: left;
            display: -webkit-box;
            -webkit-box-orient: vertical;
            -webkit-line-clamp: 3;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-all;
        }
        .lagout-conntent::after{
            content:"";
            position:absolute;
            left:0;
            top:10px;
            width:5px;
            height:5px;
            border-radius:50%;
            background:#2979FF;
        }
        .lagout-btn{
            margin:12px auto 0 auto;
            width:100px;
            height:34px;
            line-height:34px;
            display: flex;
            justify-content: center;
            align-items: center;
            background:#2979FF;
            border-radius:5px;
            color:#fff;
        }
        .header-icon{
            position: relative;
        }
        .header-icon.active::after{
            content:"";
            position:absolute;
            right:0;
            top: -13px;
            width: 8px;
            height: 8px;
            background:#ff0000;
            border-radius:50%;
        }
    </style>
</head>

        var swiper1 = new Swiper(".banner", {
            spaceBetween: 30,

                disableOnInteraction: false,
            }
        });
        var swiper2 = new Swiper(".hotPro", {

            spaceBetween: 30,
            freeMode: true,
            pagination: {
                el: ".pagin",
                clickable: true,
            },
        });
        let popList = []
        function getHome() {
            var url = preFixx + "/index/index";
            sendPostRequest({
                url,
                loading: false,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { lbt, pop_window_message,company_explain  } = data;
                        if(lbt) {
                            let bannerHtml = '';
                            lbt.forEach(item => {
                                bannerHtml += `
                                <div class="swiper-slide">
                                    <img src="${preFixx}/${item.value}" alt="">
                                </div>
                                `
                            })
                            $(".banner-slide").html(bannerHtml)
                        }
                        popList = pop_window_message.filter(item => item.status == 1);
                        const isFirst = sessionStorage.getItem("isFirst")
                        if(popList && popList.length && isFirst == "true") {
                            $(".logout-modal-mask").css("display", 'flex')
                            sessionStorage.setItem("isFirst", "false")
                            setcurrHtml(popList[0])
                        } else {
                            $(".logout-modal-mask").css("display", 'none')
                        }
                        
                        
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        $(".logout-modal").on("click", ".lagout-btn", function() {
            const id = $(this).attr("data-id");
            const nowIndex = popList.findIndex(item => item.id == id)
            popList.slice(nowIndex, 1);
            if(nowIndex == popList.length - 1) {
                $(".logout-modal-mask").css("display", 'none')
            } else {
                setcurrHtml(popList[nowIndex + 1])
            }
        })

            const id = $(this).attr("data-id");
            const nowIndex = popList.findIndex(item => item.id == id)

            if(nowIndex == popList.length - 1) {

            } else {

            }

        function getPro() {
            var url = preFixx + "/index/product/getProductList";
            sendPostRequest({
                url,
                loading: false,
                type: 'GET',
                data: {
                    status: 1
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.length) {
                            // 填充涨幅榜数据
                            const topProducts = data.sort((a, b) => a.sort - b.sort) // 按sort字段升序排序
                            const $leaderboardList = $(".leaderboard-list");

                            if(data) {
                                topProducts.sort((x, y) => y.sort - x.sort).forEach(item => {
                                    const product = item;
                                    // 计算涨跌状态
                                    const isUp = parseFloat(product.diff_rate) >= 0;
                                    const changeClass = isUp ? 'up' : 'down';
                                    const changeSign = isUp ? '+' : '';

                                    // 构建logo URL
                                    const logoUrl = product.logo ? preFixx + '/' + product.logo : './images/pro-img.png';

                                    // 查找是否已存在该产品项
                                    let $existingItem = $leaderboardList.find(`.leaderboard-item[data-id="${item.id}"]`);

                                    if($existingItem.length > 0) {
                                        // 如果已存在，只更新数据部分，不更新图标
                                        $existingItem.find('.coin-info').text(product.product_name);
                                        $existingItem.find('.coin-price')
                                            .attr('class', `coin-price ${changeClass}`)
                                            .text(parseFloat(product.price).toFixed(3));
                                        $existingItem.find('.coin-change')
                                            .attr('class', `coin-change ${changeClass} ${isUp ? 'positive' : 'negative'}`)
                                            .text(`${changeSign}${parseFloat(product.diff_rate).toFixed(2)}%`);

                                        // 更新图标容器的class
                                        $existingItem.find('.leaderboard-num').attr('class', `leaderboard-num ${changeClass}`);
                                    } else {
                                        // 如果不存在，创建新项
                                        const newItemHtml = `
                                        <div class="leaderboard-item" data-id="${item.id}">
                                           <div class="flex-start pro-name">
                                                <div class="leaderboard-num ${changeClass}">
                                                    <img src="${logoUrl}" alt="${product.product_name}" onerror="this.src='./images/pro-img.png'">
                                                </div>
                                                <div class="leaderboard-title">
                                                    <div class="coin-info">${product.product_name}</div>
                                                </div>
                                            </div>
                                            <div class="coin-price ${changeClass}">${parseFloat(product.price).toFixed(3)}</div>
                                            <div class="coin-change ${changeClass} ${isUp ? 'positive' : 'negative'}">${changeSign}${parseFloat(product.diff_rate).toFixed(2)}%</div>
                                        </div>
                                        `;
                                        $leaderboardList.append(newItemHtml);
                                    }
                                })

                                // 移除已不在列表中的产品
                                const currentIds = topProducts.map(item => item.id);
                                $leaderboardList.find('.leaderboard-item').each(function() {
                                    const itemId = parseInt($(this).attr('data-id'));
                                    if(!currentIds.includes(itemId)) {
                                        $(this).remove();
                                    }
                                });
                            }
                        }
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getHotPro() {
            var url = preFixx + "/index/product/getProductTakeList";
            sendPostRequest({
                url,
                loading: false,
                type: 'GET',
                data: {
                    is_show: 0
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const resData = result.data;
                        // 清��现有的swiper-slide
                        $('.hot-banner').empty();
                        const list = resData.sort((x, y) => y.sort - x.sort)
                        // 循环resData，动态生成swiper-slide
                        list.forEach(function(item) {
                            // 判断涨跌状态
                            const diffRate = parseFloat(item.diff_rate);
                            const priceClass = diffRate >= 0 ? 'zf' : 'die';
                            const numsClass = diffRate >= 0 ? 'zf' : 'die';

                            // 格式化价格和涨跌幅
                            const price = parseFloat(item.price).toFixed(2);
                            const diffRateText = (diffRate >= 0 ? '+' : '') + diffRate.toFixed(2) + '%';

                            // 创建swiper-slide HTML
                            const slideHtml = `
                                <div class="swiper-slide" data-id="${item.id}">
                                    <p class="market-name">
                                        ${item.product_name}
                                    </p>
                                    <p class="market-price ${priceClass}">
                                        ${price}
                                    </p>
                                    <p class="market-nums ${numsClass}">
                                        ${diffRateText}
                                    </p>
                                    <p class="market-option flex-start">
                                        <span data-i18n="nav.trade">交易</span>
                                        
                                        <i>
                                            <svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" fill="none" version="1.1" width="16" height="16" viewBox="0 0 16 16">
                                                <defs>
                                                    <clipPath id="master_svg0_5396_9412">
                                                        <rect x="0" y="0" width="16" height="16" rx="0"/>
                                                    </clipPath>
                                                </defs>
                                                <g clip-path="url(#master_svg0_5396_9412)">
                                                    <g>
                                                        <path d="M6.2265625,3.6953125L10.5118127,7.9805627L6.2265625,12.2658129L6.2265625,3.6953125Z" fill="#666666" fill-opacity="1" style="mix-blend-mode:passthrough"/>
                                                    </g>
                                                </g>
                                            </svg>
                                        </i>
                                    </p>
                                </div>
                            `;  
                            // 添加到hot-banner容器
                            $('.hot-banner').append(slideHtml);
                            i18n.init()     
                            
                        });
                        if(list && list.length > 0) {
                            sessionStorage.setItem("jiaoyiId", list[0].id);
                           $(".jiao-href").attr("href", `/jiaoyi.html?id=${list[0].id}`) 
                        }
                        
                        // 重新初始化swiper以应用新的slide
                        if (window.hotProSwiper) {
                            window.hotProSwiper.update();
                        }

                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }

        })
    </script>
