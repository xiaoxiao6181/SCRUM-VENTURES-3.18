    <script>
        $(".rechange-cak").click(function() {
            window.location.href='./rechange-list.html'
        })
        $(".pay-list").on('click', 'li', function() {
            const id = $(this).attr("data-id")
            window.location.href=`./rechange.html?id=${id}`
        })
        function getList() {
            var url = preFixx + "/index/system/getPayModeList";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.length) {
                            let reHtml = ''
                            data.forEach(item => {
                                if(item.type == 1) {
                                  reHtml += `
                                    <li data-id="${item.id}">
                                        <p class="pay-img">
                                            <img src="${ setUrl(item.channel_logo)  }" alt="">
                                        </p>
                                        <p>
                                            ${ item.pay_name }
                                        </p>
                                    </li> 
                                `  
                                }
                            })
                            $(".pay-list").html(reHtml)
                        }
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function setUrl(url) {
            if(!url || url == null) {
                    return './images/pay-img.png'
            } else {
                if(url.includes('http')) {
                    return url
                } else {
                    return preFixx + '/' + url
                }
            }
        }
        getList()
    </script>
