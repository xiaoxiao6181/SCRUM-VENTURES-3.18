    <script>
        // $(".buy-btn").click(function() {

        function getList() {
            var url = preFixx + '/index/moneyInvestment/getMoneyInvestmentOrderList'
            sendPostRequest({
                url,
                type: 'get',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { data } = result.data
                        if(data && data.length > 0) {
                            let reHtml = '';
                            data.forEach(item => {
                                reHtml += `
                                        <div class="pro-item">
                                            <div class="pro-top flex-justify">
                                                <p class="flex-start">
                                                    <span class="pro-img">
                                                        <img src="./images/prod-img.png" alt="">
                                                    </span>
                                                    <span class="pro-name">
                                                        ${item.money_investment_name}
                                                    </span>
                                                </p>
                                                <span class="">
                                                    <span data-i18n="investment_amount"></span>
                                                    ${item.price}
                                                </span>
                                            </div>
                                            <div class="pro-line">
                                                <p class="pro-line-item flex-start">
                                                    <span data-i18n="order_id">订单编号</span>
                                                    <span class="pro-line-num">
                                                        ${item.money_investment_name}
                                                    </span>
                                                </p>
                                                <div class="pro-line-area flex-justify">
                                                    
                                                    <span data-i18n="holding_period">持仓时间</span>
                                                    <span class="pro-line-num">
                                                        ${item.create_time}/${item.over_time}
                                                    </span>
                                                </div>
                                            </div>
                                            <ul class="tag-list flex-start">
                                                <li>
                                                    <p class="tag-name" data-i18n="status">状态</p>
                                                    <p class="tag-num">
                                                        ${item.status == 1 ? '<p class="tag-num" data-i18n="not_matured"></p>': '<p class="tag-num" data-i18n="matured"></p>'}
                                                        

                                                    </p>
                                                </li>
                                                <li>
                                                    <p class="tag-name" data-i18n="annual_yield">年化收益</p>
                                                    <p class="tag-num">
                                                        ${item.rate}%
                                                    </p>
                                                </li>
                                                <li>
                                                    <p class="tag-name" data-i18n="early_redemption">提前赎回</p>
                                                    <p class="tag-num">
                                                        ${item.day}
                                                        <span data-i18n="time.day"></span>
                                                    </p>
                                                </li>
                                            </ul>
                                            <div class="tag-line">
                                                <p class="tag-nums"></p>
                                                <span class="tag-text">100%</span>
                                            </div>
                                        </div>
                                `
                            })
                            $(".pro-list").html(reHtml)
                            i18n.init()     
                        }
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        } 
        getList()
    </script>
