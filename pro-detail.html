    <script>
        function getUrlParam(name) {
              const queryString = window.location.search;
              const params = new URLSearchParams(queryString);
              return params.get(name);
        }
        const currId = getUrlParam("id");
        function getYebList() {
                var url = preFixx + '/index/moneyInvestment/getMoneyInvestmentList'
                sendPostRequest({
                        url,
                        type: 'get',
                        data: {},
                        successCallback: function(result) {
                            if(result.code == 200){
                                const { data } = result;
                                if(data && data.length) {
                                    const nowIndex = data.findIndex(item => item.id == currId)
                                    
                                    let yebHtml = '';
                                    [data[nowIndex]].forEach(item => { 
                                        yebHtml += `
                                            <div class="pro-item">
                                                <div class="pro-top flex-justify">
                                                    <p class="flex-start">
                                                        <span class="pro-img">
                                                            <img src="./images/prod-img.png" alt="">
                                                        </span>
                                                        <span class="pro-name">
                                                            ${item.name}
                                                        </span>
                                                        
                                                    </p>
                                                    <span class="pro-day">
                                                        ${item.day}
                                                        <span data-i18n="time.day"></span>
                                                    </span>
                                                </div>
                                                <ul class="tag-list flex-start">
                                                    <li>
                                                        <p class="tag-name" data-i18n="limit.single"></p>
                                                        <p class="tag-num">
                                                            ${item.min_price} ~ ${item.top_price}
                                                        </p>
                                                    </li>
                                                    <li>
                                                        <p class="tag-name" data-i18n="profit.annual"></p>
                                                        <p class="tag-num">
                                                            ${item.rate}%
                                                        </p>
                                                    </li>
                                                    <li>
                                                        <p class="tag-name" data-i18n="redeem.early"></p>
                                                        <p class="tag-num">
                                                            ${item.redeem_rate}%
                                                        </p>
                                                    </li>
                                                </ul>
                                            </div>
                                    `
                                    });
                                    $(".pro-list").html(yebHtml)
                                    i18n.init();
                                }
                            } else {
                                layer.msg(result.msg);
                            }
                        },
                        errorCallback: function(xhr) {
                            console.error('请求错误', xhr);
                        }
                    })
        }
             
        function submitForm() {
            if($(".re-money").val() == 0) {
                layer.msg('请输入下单金额');
                return false;
            }
            var url = preFixx + '/index/moneyInvestment/buyMoneyInvestment'
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    id: currId,
                    money: $(".re-money").val()
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        window.location.href="/history-pro-list.html"
                    } else {
                        layer.msg(result.msg);
                    }
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getUserInfo() {
            var url = preFixx + "/index/user/getUserInfo";
            sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        const { now_money } = data;
                        $(".yue-info").val(now_money)
                    } else {
                        layer.msg(result.msg);
                    }

                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        getUserInfo()
        getYebList()
    </script>
