    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="page.shiming"></title>
    <link rel="stylesheet" href="./css/all.css">
    <script src="js/jquery-1.12.4.min.js"></script>
    <style>
        .ke-area {
            margin-top: 20px;
        }
        .modal-overlay{
            display:none;
        }
        .idcard{
            display:none;
            margin-bottom:20px;
            padding:10px 0;
            border-bottom: 1px solid #ebebeb;
        }
        .login-item {
            margin-bottom:16px;
        }
        .form-al {
            padding: 0 10px 0 0;
            border-radius: 5px;
            border: 1px solid #E1E1E1;
        }
        .login-title{
            margin-bottom:8px;
        }
        .form-money {
            width:100%;
            border-radius: 5px;
            padding: 0 10px;
            color: #000;
            height: 40px;
            outline: 0;
            line-height: 40px;
            border: none;
        }
        .login-msg-text{
            line-height:23px;
            font-size:12px;
            color:#666666;
        }
        .layui-upload-file{
            display:none;
        }
        .upImg{
            width:150px;
            height:150px;
        }
        .review-img{
            text-align: center;
            display:none;
        }
        .review-img.active{
            display:block;
        }
        .review-title{
            margin:10px 0;
            text-align: center;
            font-size: 14px;
            
        }
        .review-title.success{
            color:#34C759;
        }
        .review-title.fail{
            color:#FE800B;
        }
        .review-text{
            text-align: center;
            font-size: 12px;
            color:#999999;
        }
        .fail{
            color:#FE800B;
        }
        .waiting{
            color:#FFC53D;
        }
        .review-blog,.review-waiting{
            display:none;
            margin:20px auto;
            justify-content: flex-start;
            padding:10px;
            border-radius:10px;
            background:#FFEFE0;
        }
        .tips-icon{
            margin-right:12px;
        }
        .tips-top{
            width:calc(100% - 32px);
        }
        .tips-th{
            margin-bottom:10px;
            color:#FE800B;
        }
        .tips-text{
            font-size:12px;
            color:#666666;
            line-height:20px;
        }
        .waiting-text{
            font-size:12px;
            color:#000;
            line-height:20px;
        }
        .review-waiting{
            background:#EFF6FF;
        }
    </style>

    <script src="./js/reset.js"></script>
    <script>
        $(".list-area").click(function() {
            $(".modal-overlay").hide()
        })
        let reviewStatus = 0;
        let zhengNum = "";
        let fanNum = "";
        
        function submitForm() {
            if($("#userName").val() == '') {
                layer.msg($(".msg1").text());
                return false;
            }
            if($("#idCard").val() == '') {
                layer.msg($(".msg2").text());
                return false;
            }
            if(zhengNum == '') {
                layer.msg($(".msg3").text());
                return false;
            }
            if(fanNum == '') {
                layer.msg($(".msg4").text());
                return false;
            }
            var url = preFixx + "/index/user/submitAuthIdcard";
            sendPostRequest({
                url,
                type: 'POST',
                data: {
                    "name": $("#userName").val(),
                    "idcard": $("#idCard").val(),
                    "idcard_front_image": zhengNum,
                    "idcard_side_image": fanNum
                },
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                         window.location.href = './user.html'
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            })
        }
        function getDetail() {
           var url = preFixx + "/index/user/getAuthIdcard";
           sendPostRequest({
                url,
                type: 'GET',
                data: {},
                successCallback: function(result) {
                    if(result.code == 200){
                        const { code, data } = result;
                        if(data && data.name) {
                          const { name, idcard, idcard_front_image, idcard_side_image, explain, review_status } = data;
                          rwVIsw = review_status
                          if(rwVIsw == 0 || rwVIsw == 1) {// 审批中 和 同意
                                reviewStatus = 2;
                                $("#userName").val(name).attr("readonly", "true")
                                $("#idCard").val(idcard).attr("readonly", "true")
                                $("#uploadUrl1 img").attr("src", preFixx + '/' +idcard_front_image)
                                $("#uploadUrl2 img").attr("src", preFixx + '/' +idcard_side_image)
                                $(".login-button").hide()
                            }
                            $(".review-info .review-img").eq(rwVIsw).addClass("active").siblings().removeClass("active");
                            if(rwVIsw == 0) {
                                $(".review-title").attr("data-i18n", "msg.smrzshz").addClass("waiting")
                                $(".review-text").attr("data-i18n", "msg.ndrzxxytj")
                                $(".review-waiting").css("display", "flex")
                                
                            } else if(rwVIsw == 1) {
                                $(".review-title").attr("data-i18n", "msg.smrzytg").addClass("success")
                                $(".review-text").attr("data-i18n", "msg.ndsmytg")
                            } else {
                                $(".review-title").attr("data-i18n", "msg.smrzwtg").addClass("fail")
                                $(".review-text").attr("data-i18n", "msg.ntjdrzxxwtg")
                                $(".tips-text").text(explain)
                                $(".review-blog").css("display", "flex")
                                $(".login-button").attr("data-i18n", "msg.cxrz")
                                setUpload()
                            }
                        } else {
                            $(".review-area").hide()
                            setUpload()
                        }
                        
                    } else {
                        layer.msg(result.msg);
                    }
                    
                },
                errorCallback: function(xhr) {
                    console.error('请求错误', xhr);
                }
            }) 
       }
       function setUpload() {
           layui.use('upload', function(){
                                var upload = layui.upload;
                                var uploadInst = upload.render({
                                    elem: '#uploadUrl1' //绑定元素
                                    ,disabled: reviewStatus == 1, 
                                    url: preFixx + '/index/file/upload' //上传接口
                                    ,headers: { // 严格使用小写header
                                        token: sessionStorage.getItem('token') || 'null',
                                        Thinklang: sessionStorage.getItem('userLang') || 'zh-cn'
                                    },done: function(res){
                                        if(res.code == 200){
                                            zhengNum = res.data.file;
                                            $("#uploadUrl1 img").attr("src", preFixx + '/' +zhengNum)
                                        }
                                    }
                                    ,error: function(){
                                        layer.msg($(".msg5").text());
                                    }
                                });
                            })
                            layui.use('upload', function(){
                                var upload = layui.upload;
                                var uploadInst = upload.render({
                                    elem: '#uploadUrl2', //绑定元素
                                    disabled: reviewStatus == 1
                                    ,url: preFixx + '/index/file/upload' //上传接口
                                    ,headers: { // 严格使用小写header
                                        token: sessionStorage.getItem('token') || 'null',
                                        Thinklang: sessionStorage.getItem('userLang') || 'zh-cn'
                                    },done: function(res){
                                        if(res.code == 200){
                                            fanNum = res.data.file;
                                            $("#uploadUrl2 img").attr("src", preFixx + '/' +fanNum)
                                        }
                                    }
                                    ,error: function(){
                                        layer.msg($(".msg5").text());
                                    }
                                });
                            })
       }
       getDetail()
    </script>
